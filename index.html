/* Split a character's epithets into the part every book agrees on and the parts
   that shift. Hector is "breaker of horses" throughout, but "prince of Troy"
   until Book 6 and "bulwark of Troy" after it. Returns null when nothing shifts. */
function foldEpithets(eps){
  if(!eps || eps.length < 2) return null;
  const segs = eps.map(e=> e.ep.split(/,\s+/));
  const common = [];
  for(let i=0; i<segs[0].length; i++){
    const s = segs[0][i];
    if(segs.every(a=> a[i] === s)) common.push(s); else break;
  }
  // one epithet may be a prefix of another; give back segments until no tail is empty
  while(common.length && segs.some(a=> a.length === common.length)) common.pop();
  return {
    common: common.join(', '),
    variants: eps.map((e,i)=> ({ tail: segs[i].slice(common.length).join(', '), books:e.books }))
  };
}

/* one player card; `c` is a folded cast entry from collectCast() */
function castCard(c){
  const godcls = c.god ? ' god' : '';
  // Every book on the card is one the reader has finished — collectCast gathers no
  // other — so the trail is a record of where they met them, not a map of where
  // they will, and the epithets are only the ones those books have spoken.
  const books = c.books.map(id=>{ const p=planOf(id); return `<button class="lk" onclick="showBook('${id}')">Book ${p?p.n:id}</button>`; }).join('');
  const eps = c.epithets || [];
  const fold = foldEpithets(eps);
  let ep;
  if(!fold){
    ep = `<div class="ep${godcls}">${(eps[0] && eps[0].ep) || c.epithet}</div>`;
  } else {
    const rows = fold.variants.map(v=>{
      const ns = v.books.map(id=>{ const p=planOf(id); return p?p.n:id; }).join(' · ');
      return `<div class="epvar"><span class="ept">${v.tail}</span><span class="epbooks">${ns}</span></div>`;
    }).join('');
    ep = (fold.common ? `<div class="ep has-variants${godcls}">${fold.common}</div>` : '')
       + `<div class="eplist${godcls}">${rows}</div>`;
  }
  // Meet the character where the reader is: the last of their books, which is the
  // furthest one read. The "as of" label only earns its noise once the trail forks.
  const notes = c.notes || [];
  const note = notes[notes.length-1] || { book:'', role:'', tag:'' };
  const nb = note.book && planOf(note.book);
  const from = (nb && c.books.length > 1) ? `<div class="rlfrom">as of Book ${nb.n}</div>` : '';
  return `<div class="c"><h4 class="nm">${c.name}</h4>${ep}`+
         `${from}<p class="rl">${note.role}</p>${note.tag?`<span class="tag">${note.tag}</span>`:''}`+
         `<div class="seen">Walks through</div><div class="castbooks">${books}</div></div>`;
}

/* ---- REVIEW (the missed omens, across every book) ---- */
function showReview(){
  current=null;
  localStorage.removeItem('loom.last');
  document.getElementById('topbar').innerHTML =
    `<div class="grp"><button onclick="showHome()">✦ All Books</button>`+
      `<button onclick="showRoster()">Players</button>`+
      `<button onclick="showThreads()">Threads</button>`+
      `<button onclick="showExam()">Examination</button></div>`+
    `<div class="grp"><button class="active" disabled>Re-walking the missed</button></div>`;
  const items = allMisses();
  let h = `<div class="crown">◈ The Loom keeps its frayed strands ◈</div><h1>The Missed Omens</h1>`+
          `<div class="sub">every omen you let slip, gathered from all the books into one re-walking</div>`+
          `<div class="meta">answer true and the strand is mended — it leaves this page</div>`;
  if(!items.length){
    h += `<div class="empty">No omens outstanding. Every strand you missed has been re-walked — the loom is clean.</div>`;
    h += `<div class="footnav"><button onclick="showHome()">✦ All Books</button></div>`;
    document.getElementById('view').innerHTML=h;
    window.scrollTo({top:0,behavior:'smooth'});
    return;
  }
  h += `<div class="tally" id="rtally">${items.length} frayed strand${items.length>1?'s':''} · none yet re-walked</div>`;
  h += `<div id="review"></div>`;
  h += `<div id="reviewdone"><div class="crown" style="color:#eef3e2;">The Strands Re-walked</div><div class="rsum" id="rsum"></div><button onclick="showReview()">Gather what still frays</button></div>`;
  h += `<div class="footnav"><button onclick="showHome()">✦ All Books</button><button onclick="showThreads()">Threads</button></div>`;
  document.getElementById('view').innerHTML=h;
  buildReview(items);
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildReview(items){
  const box=document.getElementById('review');
  const total=items.length; let answered=0, mended=0;
  items.forEach(({id,qi,item})=>{
    const card=document.createElement('div'); card.className='q';
    const ki=KIND[item.kind||'event']||KIND.event;
    card.innerHTML =
      `<div class="reviewfrom">${label(id)} · ${item.n||''}</div>`+
      `<div class="qhead"><span class="qkind ${ki.cls}">${ki.label}</span></div>`+
      `<div class="qt">${item.q}</div>`;
    const truth=document.createElement('div'); truth.className='truth'; truth.innerHTML=item.truth;
    const view=shuffleOpts(item);
    view.opts.forEach((text,oi)=>{
      const b=document.createElement('button'); b.className='opt'; b.textContent=text;
      b.onclick=()=>{
        card.querySelectorAll('.opt').forEach(x=>x.disabled=true);
        const btns=card.querySelectorAll('.opt');
        if(oi===view.correct){
          b.classList.add('correct'); clearMiss(id,qi); mended++;
          card.classList.add('cleared');
        } else {
          b.classList.add('wrong'); btns[view.correct].classList.add('correct');
        }
        truth.classList.add('show'); answered++;
        document.getElementById('rtally').textContent =
          `Re-walked ${answered} of ${total} · ${mended} mended, ${answered-mended} still frayed`;
        if(answered===total) reviewDone(mended,total);
      };
      card.appendChild(b);
    });
    card.appendChild(truth); box.appendChild(card);
  });
}

function reviewDone(mended,total){
  const d=document.getElementById('reviewdone');
  const still=total-mended;
  let line;
  if(still===0) line=`All ${total} strands mended. What you once let slip, you now hold. The loom is clean.`;
  else if(mended===0) line=`None mended this pass — these ${still} run deep. Re-walk their books, then gather them again.`;
  else line=`${mended} mended, ${still} still fray. The mended ones leave this page; come back for the rest.`;
  document.getElementById('rsum').textContent=line;
  d.classList.add('show'); d.scrollIntoView({behavior:'smooth', block:'center'});
}

/* ---- BOOK ---- */
function neighbors(id){
  const a = ORDER.filter(authored);
  const i = a.indexOf(id);
  return { prev: i>0?a[i-1]:null, next: (i>=0&&i<a.length-1)?a[i+1]:null };
}

function topbar(id){
  const p = planOf(id);
  const {prev,next} = neighbors(id);
  const read = isRead(id);
  document.getElementById('topbar').innerHTML =
    `<div class="grp">`+
      `<button onclick="showHome()">✦ All Books</button>`+
      `<button ${prev?`onclick="showBook('${prev}')"`:'disabled'}>← Prev</button>`+
      `<button ${next?`onclick="showBook('${next}')"`:'disabled'}>Next →</button>`+
      `<button onclick="showRoster()">Players</button>`+
      `<button onclick="showThreads()">Threads</button>`+
      `<button onclick="showReview()">Review</button>`+
      `<button onclick="showExam()">Examination</button>`+
    `</div>`+
    `<div class="grp"><span class="pos">${p.short} · Book ${p.n}</span>`+
      `<button class="readtoggle${read?' on':''}" onclick="toggleRead('${id}')">${read?'✓ Read':'Mark read'}</button>`+
    `</div>`;
}

function toggleRead(id){
  const now = !isRead(id);
  setRead(id, now);
  if(now) recordDay('read', id);
  topbar(id);
}

function showBook(id){
  if(!authored(id)) return;
  current=id; localStorage.setItem('loom.last', id);
  topbar(id);
  renderBody(window.LOOM_DATA[id]);
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderBody(d){
  const m=d.meta; let h='';
  h += `<div class="crown">◈ ${m.song} · ${m.epic} ◈</div><h1>${m.title}</h1>`;
  if(m.subtitle) h += `<div class="sub">${m.subtitle}</div>`;
  if(m.tagline) h += `<div class="meta">${m.tagline}</div>`;
  if(m.epigraph) h += `<div class="invoke">${m.epigraph.text}<span class="src">${m.epigraph.src||''}</span></div>`;
  if(d.recap&&d.recap.length) h += `<div class="recap"><span class="lbl">✦ Previously, on ${m.epic} ✦</span>${d.recap.map(p=>`<p>${p}</p>`).join('')}</div>`;
  if(d.scene&&d.scene.length) h += `<div class="scene"><span class="lbl">✦ The scene is set ✦</span>${d.scene.map(p=>`<p>${p}</p>`).join('')}</div>`;
  if(d.terms&&d.terms.length){
    h += `<div class="band"><span>Words to carry</span><hr></div><div class="terms">`+
      d.terms.map(t=>`<div class="t"><span class="gk">${t.gk}</span> — <span class="df">${t.def}</span></div>`).join('')+`</div>`;
  }
  if(d.movements&&d.movements.length){
    h += `<div class="band"><span>The movements</span><hr></div>`;
    d.movements.forEach(mv=>{ h += `<div class="movement"><div class="mnum">${mv.n||''}</div><h3 class="mtitle">${mv.title}</h3>${mv.what}<div class="why"><b>Why it matters:</b> ${mv.why}</div></div>`; });
  }
  if(d.panels&&d.panels.length){
    d.panels.forEach(p=>{ h += `<div class="simile"><span class="lbl">${p.label}</span>${p.lines.map(l=>`<p>${l}</p>`).join('')}</div>`; });
  }
  if(d.characters){
    Object.keys(d.characters).forEach(group=>{
      h += `<div class="band"><span>${group}</span><hr></div>`;
      d.characters[group].forEach(c=>{
        const godcls=(group.toLowerCase().includes('god')||c.god)?' god':'';
        h += `<div class="c"><h4 class="nm">${c.name}</h4><div class="ep${godcls}">${c.epithet}</div><p class="rl">${c.role}</p>${c.tag?`<span class="tag">${c.tag}</span>`:''}</div>`;
      });
    });
  }
  if(d.threads&&d.threads.length){
    h += `<div class="band"><span>Threads of the Loom</span><hr></div>`;
    d.threads.forEach(t=> h += threadCard(t, current));
  }
  if(d.quiz&&d.quiz.length){
    h += `<div class="divider">❧ · ❧ · ❧</div>`;
    h += `<div class="gate"><div class="crown">◈ The Ninth Hour ◈</div><h2>The Oracle's Examination</h2><div class="sub">${d.quiz.length} omens · the thread holds or the shears draw near</div></div>`;
    const best=bestScore(current);
    h += `<div class="priorscore">${best!=null?`Your best reckoning here: ${best} / ${d.quiz.length}`:'Not yet examined on this book.'}</div>`;
    const pm = priorMiss(current);
    if(pm.length) h += `<div class="missnote">↺ ${pm.length} omen${pm.length>1?'s':''} slipped last time — marked below. Linger there.</div>`;
    h += renderThread(d.quiz.length);
    h += `<div class="tally" id="tally">${d.quiz.length} omens to read · none yet turned</div><div id="quiz"></div>`;
    h += `<div id="verdict"><div class="crown" style="color:#e8c79a;">The Fates Render Judgment</div><div class="score" id="scoreNum"></div><div class="vline" id="vLine"></div><div class="breakdown" id="breakdown"></div><div class="small">Tap a truth to read it · the thread spins on</div><button onclick="showBook(current)">Sit the omens again</button></div>`;
  }
  const {prev,next}=neighbors(current);
  h += `<div class="footnav"><button ${prev?`onclick="showBook('${prev}')"`:'disabled'}>← Prev</button>`+
       `<button onclick="showHome()">✦ All Books</button>`+
       `<button ${next?`onclick="showBook('${next}')"`:'disabled'}>Next →</button></div>`;

  document.getElementById('view').innerHTML=h;
  if(d.quiz&&d.quiz.length) buildQuiz(d.quiz);
}

/* ---- quiz ---- */
/* The data pins the correct answer to a fixed slot (historically almost always
   index 1 — the second option), so a reader could pass by always tapping the
   second choice. Shuffle each question's options at render time and remap the
   correct index. Safe for persistence: misses/scores are keyed by question index
   (qi), never by option position. */
function shuffleOpts(item){
  const idx=item.opts.map((_,i)=>i);
  for(let i=idx.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]; }
  return { opts: idx.map(i=>item.opts[i]), correct: idx.indexOf(item.correct) };
}

const FORMAT = { choice:'choice', sequence:'sequence' };
const formatOf = o => FORMAT[o && o.format] || FORMAT.choice;

function renderThread(total){
  const pips = Array.from({length: total}, () => '<i class="pip"></i>').join('');
  return `<div class="fraythread"><span class="lbl">The thread</span>`+
         `<span class="pips">${pips}</span><span class="shears">✂</span></div>`;
}
function frayThread(missCount, total){
  const pips = document.querySelectorAll('.fraythread .pip');
  for(let i=0; i<pips.length; i++) pips[i].classList.toggle('frayed', i < missCount);
  const sh = document.querySelector('.fraythread .shears');
  if(sh) sh.classList.toggle('near', total>0 && missCount > total/2);
}

function renderChoice(card, item, onDone){
  const view = shuffleOpts(item);
  view.opts.forEach((text, oi) => {
    const b = document.createElement('button'); b.className='opt'; b.textContent = text;
    b.onclick = () => {
      card.querySelectorAll('.opt').forEach(x => x.disabled = true);
      const btns = card.querySelectorAll('.opt');
      const right = oi === view.correct;
      if(right) b.classList.add('correct');
      else { b.classList.add('wrong'); btns[view.correct].classList.add('correct'); }
      onDone(right);
    };
    card.appendChild(b);
  });
}

function renderSequence(card, item, onDone){
  const wrap = document.createElement('div'); wrap.className='seq';
  const chosen = [];
  item.items.forEach((title, idx) => {
    const b = document.createElement('button');
    b.className = 'beat'; b.type = 'button';
    b.innerHTML = `<span class="ord"></span>${title}`;
    b.onclick = () => {
      if(b.classList.contains('chosen')) return;
      chosen.push(idx);
      b.classList.add('chosen');
      b.querySelector('.ord').textContent = chosen.length + '.';
      if(chosen.length === item.items.length){
        wrap.querySelectorAll('.beat').forEach(x => x.disabled = true);
        const right = chosen.every((v,i) => v === item.answer[i]);
        wrap.querySelectorAll('.beat').forEach((x,i) => {
          const place = item.answer.indexOf(i);
          x.querySelector('.ord').textContent = (place+1) + '.';
          x.style.borderColor = right ? 'var(--ok)' : 'var(--line)';
        });
        onDone(right);
      }
    };
    wrap.appendChild(b);
  });
  card.appendChild(wrap);
}

/* A read book with a perfect best score is shown as already-completed: every
   question rendered pre-answered (correct option locked green, truth revealed),
   the golden verdict shown statically, and the "Sit the omens again" button
   repointed to a fresh attempt. No per-answer storage exists to restore, but a
   6/6 seed means every answer was correct, so this reconstruction is faithful.
   forceFresh (from retakeQuiz) skips this and builds a live, blank quiz. */
function buildQuiz(Q, forceFresh){
  const quiz=document.getElementById('quiz');
  if(!forceFresh && isRead(current) && bestScore(current)===Q.length){
    Q.forEach(item=>{
      const card=document.createElement('div'); card.className='q';
      const k=item.kind||'event'; const ki=KIND[k]||KIND.event;
      card.innerHTML=
        `<div class="qhead"><span class="qn">${item.n||''}</span>`+
        `<span class="qkind ${ki.cls}">${ki.label}</span></div>`+
        `<div class="qt">${item.q}</div>`;
      const truth=document.createElement('div'); truth.className='truth show'; truth.innerHTML=item.truth;
      const view=shuffleOpts(item);
      view.opts.forEach((text,oi)=>{
        const b=document.createElement('button'); b.className='opt'; b.textContent=text; b.disabled=true;
        if(oi===view.correct) b.classList.add('correct');
        card.appendChild(b);
      });
      card.appendChild(truth); quiz.appendChild(card);
    });
    document.getElementById('tally').textContent=`All omens already read · ${Q.length} of ${Q.length} · the thread held`;
    const stats={}; Q.forEach(item=>{ const k=item.kind||'event'; (stats[k]=stats[k]||{c:0,t:0}); stats[k].c++; stats[k].t++; });
    const v=document.getElementById('verdict');
    document.getElementById('scoreNum').textContent=`${Q.length} / ${Q.length}`;
    document.getElementById('vLine').textContent="The thread runs golden. You read clearly — the Fates smile on this one.";
    const order=['event','meaning','thread'];
    document.getElementById('breakdown').innerHTML =
      order.filter(k=>stats[k]).map(k=>`<span class="bk">${KIND[k].label} · ${stats[k].c}/${stats[k].t}</span>`).join('');
    v.classList.add('show');
    const again=v.querySelector('button'); if(again) again.onclick=retakeQuiz;
    return;
  }
  const pm = priorMiss(current);
  let answered=0, score=0;
  const missArr=[];
  const stats={};  // kind -> {c,t}
  Q.forEach(item=>{ const k=item.kind||'event'; (stats[k]=stats[k]||{c:0,t:0}).t++; });

  Q.forEach((item,qi)=>{
    const card=document.createElement('div'); card.className='q';
    const k = item.kind||'event';
    const ki = KIND[k]||KIND.event;
    const missedBefore = pm.includes(qi);
    card.innerHTML=
      `<div class="qhead"><span class="qn">${item.n||''}</span>`+
      `<span class="qkind ${ki.cls}">${ki.label}</span>`+
      `${missedBefore?'<span class="missflag">↺ missed last time</span>':''}</div>`+
      `<div class="qt">${item.q}</div>`;
    const truth=document.createElement('div'); truth.className='truth'; truth.innerHTML=item.truth;
    const renderer = formatOf(item)==='sequence' ? renderSequence : renderChoice;
    renderer(card, item, right => {
      if(right){ score++; stats[k].c++; }
      else { missArr.push(qi); frayThread(missArr.length, Q.length); }
      truth.classList.add('show'); answered++;
      document.getElementById('tally').textContent=`Omens read · ${answered} of ${Q.length}`;
      if(answered===Q.length) reveal(score, Q.length, stats, missArr);
    });
    card.appendChild(truth); quiz.appendChild(card);
  });
}

/* Leave the completed view and start a fresh, blank attempt without disturbing
   the stored best score (saveScore only ever raises it). */
function retakeQuiz(){
  const d=window.LOOM_DATA[current]; if(!d||!d.quiz) return;
  const v=document.getElementById('verdict');
  if(v){ v.classList.remove('show'); const again=v.querySelector('button'); if(again) again.onclick=()=>showBook(current); }
  document.getElementById('quiz').innerHTML='';
  frayThread(0, d.quiz.length);
  document.getElementById('tally').textContent=`${d.quiz.length} omens to read · none yet turned`;
  buildQuiz(d.quiz, true);
}

function reveal(score,total,stats,missArr){
  saveScore(current,score);
  saveMiss(current, missArr.slice().sort((a,b)=>a-b));
  recordDay('sat', current);
  const v=document.getElementById('verdict');
  document.getElementById('scoreNum').textContent=`${score} / ${total}`;
  const pct=score/total; let line;
  if(pct===1) line="The thread runs golden. You read clearly — the Fates smile on this one.";
  else if(pct>=0.7) line="The thread holds bright. The book lives in you; a strand or two slipped. Onward.";
  else if(pct>=0.4) line="The thread holds. The spine is yours, the finer turns still forming. Re-walk the movements and go on.";
  else if(pct>0) line="One light in the fog. A single true sight is a beginning; the rest passed too quick. Linger here once more.";
  else line="The thread frays at the meaning, not the count. The pages turned faster than the tale took root. No frown — sit longer.";
  document.getElementById('vLine').textContent=line;
  const order=['event','meaning','thread'];
  const bd = order.filter(k=>stats[k]).map(k=>`<span class="bk">${KIND[k].label} · ${stats[k].c}/${stats[k].t}</span>`).join('');
  document.getElementById('breakdown').innerHTML = bd;
  v.classList.add('show'); v.scrollIntoView({behavior:'smooth', block:'center'});
}

/* ---- THE GRAND EXAMINATION (every authored book, one cumulative sitting) ---- */
/* Pool every quiz omen across all authored books, each tagged with its source book
   so a miss/mend can flow back into the per-book Review loop. */
function examPool(){
  const out=[];
  ORDER.filter(authored).forEach(id=>{
    const d=window.LOOM_DATA[id];
    (d.quiz||[]).forEach((item,qi)=> out.push({srcId:id, qi, item}));
  });
  return out;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

function showExam(){
  current=null;
  localStorage.removeItem('loom.last');
  document.getElementById('topbar').innerHTML =
    `<div class="grp"><button onclick="showHome()">✦ All Books</button>`+
      `<button onclick="showRoster()">Players</button>`+
      `<button onclick="showThreads()">Threads</button>`+
      `<button onclick="showReview()">Review</button></div>`+
    `<div class="grp"><button class="active" disabled>The Grand Examination</button></div>`;
  const pool = shuffle(examPool());
  const total = pool.length;
  let h = `<div class="crown">◈ Every thread drawn taut ◈</div><h1>The Grand Examination</h1>`+
          `<div class="sub">all ${total} omens from the books you have walked, gathered into one reckoning</div>`+
          `<div class="meta">the Fates weigh every book at once — no book announced, the thread alone must tell</div>`;
  if(!total){
    h += `<div class="empty">No omens to sit yet. Author a book with a <i>quiz</i> and the examination opens.</div>`+
         `<div class="footnav"><button onclick="showHome()">✦ All Books</button></div>`;
    document.getElementById('view').innerHTML=h; window.scrollTo({top:0,behavior:'smooth'}); return;
  }
  const best=bestScore('exam');
  h += `<div class="priorscore">${best!=null?`Your best reckoning across all books: ${best} / ${total}`:'Not yet sat in full.'}</div>`;
  h += `<div class="divider">❧ · ❧ · ❧</div>`;
  h += `<div class="tally" id="tally">${total} omens to read · none yet turned</div><div id="exam"></div>`;
  h += `<div id="verdict"><div class="crown" style="color:#e8c79a;">The Fates Render Full Judgment</div><div class="score" id="scoreNum"></div><div class="vline" id="vLine"></div><div class="breakdown" id="breakdown"></div><div class="books" id="bookbreak"></div><div class="small">Tap a truth to read it · every book at once</div><button onclick="showExam()">Sit the full reckoning again</button></div>`;
  h += `<div class="footnav"><button onclick="showHome()">✦ All Books</button><button onclick="showThreads()">Threads</button><button onclick="showReview()">Review</button></div>`;
  document.getElementById('view').innerHTML=h;
  buildExam(pool);
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildExam(items){
  const box=document.getElementById('exam');
  const total=items.length; let answered=0, score=0;
  const stats={};   // kind   -> {c,t}
  const byBook={};  // srcId  -> {c,t}
  items.forEach(({srcId,item})=>{ const k=item.kind||'event';
    (stats[k]=stats[k]||{c:0,t:0}).t++; (byBook[srcId]=byBook[srcId]||{c:0,t:0}).t++; });
  items.forEach(({srcId,qi,item},idx)=>{
    const card=document.createElement('div'); card.className='q';
    const k=item.kind||'event'; const ki=KIND[k]||KIND.event;
    card.innerHTML=
      `<div class="qhead"><span class="qn">Omen ${idx+1} of ${total}</span>`+
      `<span class="qkind ${ki.cls}">${ki.label}</span></div>`+
      `<div class="qt">${item.q}</div>`;
    const truth=document.createElement('div'); truth.className='truth';
    const view=shuffleOpts(item);
    view.opts.forEach((text,oi)=>{
      const b=document.createElement('button'); b.className='opt'; b.textContent=text;
      b.onclick=()=>{
        card.querySelectorAll('.opt').forEach(x=>x.disabled=true);
        const btns=card.querySelectorAll('.opt');
        if(oi===view.correct){ b.classList.add('correct'); score++; stats[k].c++; byBook[srcId].c++; clearMiss(srcId,qi); }
        else{ b.classList.add('wrong'); btns[view.correct].classList.add('correct');
              saveMiss(srcId, Array.from(new Set([...priorMiss(srcId), qi])).sort((a,b)=>a-b)); }
        /* source book stays hidden until answered, then revealed with the truth */
        truth.innerHTML = item.truth + `<div class="examsrc">— ${label(srcId)}${item.n?` · ${item.n}`:''}</div>`;
        truth.classList.add('show'); answered++;
        document.getElementById('tally').textContent=`Omens read · ${answered} of ${total}`;
        if(answered===total) examReveal(score,total,stats,byBook);
      };
      card.appendChild(b);
    });
    card.appendChild(truth); box.appendChild(card);
  });
}

function examReveal(score,total,stats,byBook){
  saveScore('exam',score);
  const v=document.getElementById('verdict');
  document.getElementById('scoreNum').textContent=`${score} / ${total}`;
  const pct=score/total; let line;
  if(pct===1) line="Every thread runs golden across all the books. The whole tale lives in you — the Fates fall silent, and that silence is the highest praise.";
  else if(pct>=0.85) line="The weave holds bright end to end. A strand or two slipped, but the epic is yours.";
  else if(pct>=0.7) line="The weave holds. The great shape of the war is in you; the finer turns still settling — gather the frayed omens in the Review.";
  else if(pct>=0.4) line="The spine holds, the detail wavers. You know where the tale is going; sit with the books that slipped and the picture sharpens.";
  else if(pct>0) line="Lights in the fog. Some threads caught, most passed too quick across so many books — gather them in the Review and walk again.";
  else line="The reckoning frays. So many books read fast leave little to hold — no frown; re-walk them one by one, then return to the full sitting.";
  document.getElementById('vLine').textContent=line;
  const order=['event','meaning','thread'];
  const bd=order.filter(k=>stats[k]).map(k=>`<span class="bk">${KIND[k].label} · ${stats[k].c}/${stats[k].t}</span>`).join('');
  document.getElementById('breakdown').innerHTML=bd;
  /* per-book reckoning — canonical reading order; a book under half its omens is flagged to re-walk */
  const rows = ORDER.filter(authored).filter(id=>byBook[id]).map(id=>{
    const {c,t}=byBook[id]; const pct=Math.round((c/t)*100); const weak=c/t<0.5;
    return `<div class="brow${weak?' weak':''}"><span class="bl">${label(id)}</span>`+
           `<span class="bbar"><i style="width:${pct}%"></i></span>`+
           `<span class="bsc">${c}/${t}</span></div>`;
  }).join('');
  document.getElementById('bookbreak').innerHTML = rows
    ? `<h4>By book</h4>${rows}` : '';
  v.classList.add('show'); v.scrollIntoView({behavior:'smooth', block:'center'});
}

/* ---- kickoff: load authored data files, then boot (runs after all decls) ---- */
/* single-file build: all book data is inlined above, so boot directly */
boot();
