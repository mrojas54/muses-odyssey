<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Muse's Odyssey</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Muse’s Odyssey">
<meta name="theme-color" content="#7c2331">

<style>
  :root{
    --ink:#2b211a; --soft:#6b5d4f; --parch:#f4ebdc; --parch2:#efe3cf;
    --wine:#7c2331; --gold:#b8862f; --olive:#5d6b3a; --sky:#3f5a6b;
    --ok:#46663d; --ok-bg:#e6efd9; --no:#8a3a3f; --no-bg:#f3dcd9;
    --card:#fffaf0; --line:#e0d2ba;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0; background:radial-gradient(120% 100% at 50% 0%, #f7efe0 0%, #ecdcc2 100%);
    color:var(--ink); font-family:Georgia,'Times New Roman',serif; line-height:1.6; padding:20px 16px 80px;}
  .wrap{max-width:660px; margin:0 auto;}

  /* masthead */
  .masthead{text-align:center; margin:6px 0 18px;}
  .masthead .mark{font-size:15px; letter-spacing:6px; text-transform:uppercase; color:var(--wine);}
  .masthead .mark b{font-weight:normal;}
  .masthead .by{color:var(--soft); font-style:italic; font-size:13px; margin-top:5px; letter-spacing:.5px;}
  .masthead .rule{width:64px; height:1px; background:var(--gold); margin:12px auto 0; opacity:.7;}

  /* persistent nav bar */
  .topbar{display:flex; align-items:center; gap:10px; justify-content:space-between; flex-wrap:wrap;
    margin-bottom:24px; padding-bottom:14px; border-bottom:1px solid var(--line);}
  .topbar:empty{display:none;}
  .topbar .grp{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .topbar button{font:inherit; font-size:13px; background:var(--parch); border:1px solid var(--line);
    color:var(--soft); border-radius:20px; padding:6px 13px; cursor:pointer; transition:.15s;}
  .topbar button:hover:not(:disabled){border-color:var(--gold);}
  .topbar button:disabled{opacity:.35; cursor:default;}
  .topbar button.active{background:var(--olive); color:#fbeede; border-color:var(--olive);}
  .topbar .pos{font-style:italic; color:var(--soft); font-size:14px;}
  .topbar .readtoggle.on{background:var(--olive); color:#fbeede; border-color:var(--olive);}

  /* home — progress + grid */
  .progress{text-align:center; color:var(--soft); font-size:13px; letter-spacing:1px; margin:4px 0 6px;}
  .progbar{height:6px; background:var(--parch2); border-radius:4px; overflow:hidden; margin:8px auto 14px; max-width:360px;}
  .progbar > i{display:block; height:100%; background:var(--gold); transition:width .4s ease;}
  .homeacts{text-align:center; margin:0 0 22px;}
  .homeacts button{font:inherit; font-size:13px; background:var(--parch); border:1px solid var(--line);
    color:var(--wine); border-radius:20px; padding:7px 16px; cursor:pointer; transition:.15s; letter-spacing:.5px;}
  .homeacts button:hover{border-color:var(--gold);}
  .band{display:flex; align-items:center; gap:12px; margin:26px 0 14px;}
  .band hr{flex:1; border:none; border-top:1px solid var(--line);}
  .band span{color:var(--gold); font-size:12px; letter-spacing:3px; text-transform:uppercase; white-space:nowrap;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(96px,1fr)); gap:10px;}
  .cell{border:1px solid var(--line); border-radius:11px; padding:10px 8px; text-align:center; background:var(--card);
    cursor:pointer; transition:.12s; min-height:84px; display:flex; flex-direction:column; justify-content:center; gap:3px;}
  .cell:hover{border-color:var(--gold); transform:translateY(-1px);}
  .cell .bk{font-size:13px; letter-spacing:1px; text-transform:uppercase; color:var(--wine);}
  .cell .tt{font-size:11px; color:var(--soft); line-height:1.25; max-height:2.6em; overflow:hidden;}
  .cell .st{font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--olive);}
  .cell.read{box-shadow:inset 0 0 0 2px #5d6b3a55;}
  .cell.unwritten{background:transparent; border-style:dashed; cursor:default; opacity:.5;}
  .cell.unwritten:hover{transform:none; border-color:var(--line);}
  .cell.unwritten .bk{color:var(--soft);}

  /* book view */
  .crown{text-align:center; color:var(--wine); letter-spacing:3px; font-size:13px; text-transform:uppercase; margin-bottom:6px;}
  h1{text-align:center; font-size:29px; margin:0 0 4px; font-weight:normal;}
  .sub{text-align:center; color:var(--soft); font-style:italic; font-size:15px; margin-bottom:8px;}
  .meta{text-align:center; color:var(--gold); font-size:12px; letter-spacing:2px; text-transform:uppercase; margin-bottom:26px;}
  .scene{background:linear-gradient(160deg, #2a2030 0%, #1f2a33 100%); color:#e9dcc6; border-radius:16px; padding:24px 22px; margin-bottom:30px; font-size:16px;}
  .scene .lbl{color:#d9b366; font-size:12px; letter-spacing:3px; text-transform:uppercase; text-align:center; display:block; margin-bottom:12px;}
  .scene p{margin:0 0 12px;} .scene p:last-child{margin-bottom:0;} .scene i{color:#f0e2c8;}
  .recap{background:var(--parch2); border:1px solid var(--line); border-left:4px solid var(--wine); border-radius:12px; padding:18px 20px; margin-bottom:26px; font-size:15px; font-style:italic; color:var(--soft);}
  .recap .lbl{color:var(--wine); font-size:11px; letter-spacing:3px; text-transform:uppercase; text-align:center; display:block; margin-bottom:10px; font-style:normal;}
  .recap p{margin:0 0 10px;} .recap p:last-child{margin-bottom:0;} .recap b{color:var(--ink); font-style:normal; font-weight:normal;}
  .invoke{background:var(--wine); color:#fbeede; border-radius:16px; padding:22px; margin-bottom:30px; text-align:center; font-style:italic; font-size:17px;}
  .invoke .src{display:block; font-style:normal; font-size:12px; letter-spacing:2px; text-transform:uppercase; color:#e8c79a; margin-top:12px;}
  .movement{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:22px 20px; margin-bottom:18px; box-shadow:0 2px 10px #00000010;}
  .mnum{color:var(--gold); font-size:12px; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px;}
  .mtitle{font-size:21px; margin:0 0 12px; font-weight:normal;}
  .movement p{margin:0 0 12px;} .movement p:last-child{margin-bottom:0;}
  .why{border-left:3px solid var(--gold); background:#fbf4e3; padding:11px 15px; border-radius:0 8px 8px 0; font-size:15px; color:var(--soft); margin-top:4px;}
  .why b{color:var(--ink);}
  .who{color:var(--wine); font-style:italic;} .god{color:var(--sky); font-style:italic;}
  .simile{margin:26px 0; padding:18px 20px; border:1px dashed var(--gold); border-radius:12px; background:#fdf7ea; font-style:italic; color:var(--soft); font-size:15px;}
  .simile .lbl{display:block; font-style:normal; color:var(--gold); font-size:12px; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; text-align:center;}
  .simile p{margin:0 0 9px;} .simile p:last-child{margin-bottom:0;}
  .terms{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px 20px; margin-bottom:18px;}
  .terms .t{margin-bottom:11px;} .terms .t:last-child{margin-bottom:0;}
  .terms .gk{color:var(--wine); font-style:italic; font-weight:bold;} .terms .df{color:var(--soft); font-size:15px;}
  .c{background:var(--card); border:1px solid var(--line); border-radius:13px; padding:15px 18px; margin-bottom:12px; box-shadow:0 2px 9px #00000010;}
  .c .nm{font-size:18px; margin:0;} .c .ep{font-style:italic; font-size:13.5px; margin:1px 0 8px; color:var(--wine);} .c .ep.god{color:var(--sky);}
  .c .ep.has-variants{margin-bottom:2px;}
  .c .eplist{margin:0 0 8px; padding:0;}
  .c .epvar{display:flex; flex-wrap:wrap; align-items:baseline; gap:0 8px; font-size:13px; line-height:1.7;}
  .c .epvar::before{content:"·"; color:var(--gold); margin-right:2px;}
  .c .epvar .ept{font-style:italic; color:var(--wine);}
  .c .eplist.god .epvar .ept{color:var(--sky);}
  .c .epvar .epbooks{font-size:11px; letter-spacing:1.4px; color:var(--gold); white-space:nowrap;}
  .c .rlfrom{font-size:10.5px; letter-spacing:1.6px; text-transform:uppercase; color:var(--gold); margin:10px 0 -2px;}
  .c .rl{margin:0; font-size:15px;}
  .tag{display:inline-block; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--olive); border:1px solid var(--line); border-radius:20px; padding:2px 9px; margin-top:9px;}
  /* roster: the books a player walks through */
  .c .seen{font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin:12px 0 6px;}
  .c .castbooks{display:flex; flex-wrap:wrap; gap:7px;}
  .c .castbooks .lk{font:inherit; font-size:12.5px; background:var(--parch); border:1px solid var(--line); color:var(--wine); border-radius:20px; padding:5px 12px; cursor:pointer; transition:.15s;}
  .c .castbooks .lk:hover{border-color:var(--gold);}
  .c .castbooks .lk:active{transform:translateY(1px);}

  /* threads */
  .thread{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px 20px; margin-bottom:14px; box-shadow:0 2px 9px #00000010;}
  .thread .dir{font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:6px;}
  .thread .tt{font-size:18px; margin:0 0 8px; font-weight:normal;}
  .thread .nt{margin:0 0 13px; font-size:15px; color:var(--soft);}
  .thread .lk{font:inherit; font-size:13px; background:var(--parch); border:1px solid var(--line); color:var(--wine); border-radius:20px; padding:6px 13px; cursor:pointer; transition:.15s;}
  .thread .lk:hover{border-color:var(--gold);}
  .thread .lk:disabled{opacity:.45; cursor:default; color:var(--soft);}
  .thread .from{font-size:12px; color:var(--soft); font-style:italic; margin-bottom:8px;}

  /* the day's measure */
  .rite{background:var(--card); border:1px solid var(--line); border-radius:10px;
        padding:14px 16px; margin:14px 0 6px;}
  .rite .hd{font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--wine);}
  .rite .goal{font-size:17px; margin:6px 0 2px;}
  .rite .goal b{color:var(--wine);}
  .rite .meta{font-size:13px; color:var(--soft); font-style:italic;}
  .rite .streak{font-size:13px; color:var(--gold); margin-top:4px;}
  .rite .door{font-size:13px; color:var(--soft); margin-top:4px;}
  .rite .adj{background:none; border:1px solid var(--line); color:var(--soft);
             border-radius:6px; min-width:34px; min-height:34px; font:inherit; cursor:pointer;}
  .rite .adj:active{background:var(--parch2);}

  /* the fraying thread — a barometer, never a life bar */
  .fraythread{display:flex; align-items:center; gap:8px; justify-content:center; margin:12px 0 4px;}
  .fraythread .pips{display:flex; gap:5px;}
  .fraythread .pip{width:9px; height:9px; border-radius:50%; background:var(--gold);
                   transition:background .35s, opacity .35s;}
  .fraythread .pip.frayed{background:transparent; box-shadow:inset 0 0 0 1px var(--no); opacity:.55;}
  .fraythread .shears{color:var(--soft); font-size:15px; transition:color .35s;}
  .fraythread .shears.near{color:var(--no);}
  .fraythread .lbl{font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--soft);}

  /* sequence omens — tap the beats into their true order */
  .seq{display:flex; flex-direction:column; gap:8px; margin-top:8px;}
  .seq .beat{text-align:left; background:var(--card); border:1px solid var(--line);
             border-radius:8px; padding:11px 13px; font:inherit; color:var(--ink);
             cursor:pointer; min-height:44px;}
  .seq .beat:active{background:var(--parch2);}
  .seq .beat.chosen{border-color:var(--gold); color:var(--soft);}
  .seq .beat .ord{color:var(--wine); font-weight:bold; margin-right:8px;}
  .seq .beat[disabled]{cursor:default;}

  /* quiz */
  .divider{text-align:center; color:var(--gold); letter-spacing:6px; margin:34px 0 26px; font-size:16px;}
  .gate{text-align:center; margin-bottom:8px;}
  .gate h2{font-size:24px; font-weight:normal; margin:0 0 4px;}
  .priorscore{text-align:center; color:var(--soft); font-size:13px; font-style:italic; margin:6px 0 6px;}
  .missnote{text-align:center; color:var(--wine); font-size:13px; font-style:italic; margin:0 0 14px;}
  .tally{text-align:center; color:var(--soft); font-size:13px; letter-spacing:2px; margin:0 0 18px; text-transform:uppercase;}
  .q{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px 18px; margin-bottom:18px; box-shadow:0 2px 10px #00000010;}
  .qhead{display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-bottom:8px;}
  .qn{color:var(--gold); font-size:12px; letter-spacing:2px; text-transform:uppercase;}
  .reviewfrom{font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--soft); margin-bottom:6px;}
  .q.cleared{opacity:.6;}
  #reviewdone{display:none; text-align:center; background:var(--olive); color:#f3f7ea; border-radius:16px; padding:26px 22px; margin-top:8px;}
  #reviewdone.show{display:block; animation:fade .4s ease;}
  #reviewdone .rsum{font-size:18px; font-style:italic; margin:8px 0 4px;}
  #reviewdone button{font:inherit; margin-top:16px; background:#f3f7ea; color:var(--olive); border:none; border-radius:20px; padding:8px 18px; cursor:pointer; letter-spacing:1px;}
  .qkind{display:inline-block; font-size:10px; letter-spacing:1px; text-transform:uppercase; border-radius:20px; padding:2px 9px;}
  .k-event{color:var(--olive); border:1px solid #5d6b3a55; background:#eef2e3;}
  .k-meaning{color:var(--sky); border:1px solid #3f5a6b44; background:#e7eef2;}
  .k-thread{color:var(--wine); border:1px solid #7c233144; background:#f6e6e7;}
  .missflag{font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--gold); border:1px solid var(--gold); border-radius:20px; padding:2px 9px;}
  .qt{font-size:18px; margin-bottom:16px;}
  .opt{display:block; width:100%; text-align:left; font:inherit; font-size:16px; background:var(--parch); border:1px solid var(--line); border-radius:10px; padding:13px 15px; margin-bottom:10px; cursor:pointer; color:var(--ink); transition:transform .08s ease, background .15s ease, border-color .15s ease;}
  .opt:active{transform:scale(.99);} .opt:hover{border-color:var(--gold);}
  .opt.correct{background:var(--ok-bg); border-color:var(--ok); color:var(--ok); font-weight:bold;}
  .opt.wrong{background:var(--no-bg); border-color:var(--no); color:var(--no);}
  .opt:disabled{cursor:default;}
  .truth{display:none; margin-top:4px; padding:13px 15px; border-left:3px solid var(--gold); background:#fbf4e3; border-radius:0 8px 8px 0; font-size:15px; color:var(--soft);}
  .truth b{color:var(--ink);} .truth.show{display:block; animation:fade .3s ease;}
  .examsrc{margin-top:10px; color:var(--gold); font-size:12px; letter-spacing:1px; text-transform:uppercase;}
  @keyframes fade{from{opacity:0; transform:translateY(-3px);} to{opacity:1;}}
  #verdict{display:none; text-align:center; background:var(--wine); color:#fbeede; border-radius:16px; padding:28px 22px; margin-top:8px;}
  #verdict.show{display:block; animation:fade .4s ease;}
  #verdict .score{font-size:46px; letter-spacing:2px; margin:6px 0;}
  #verdict .vline{font-size:19px; font-style:italic; margin-top:10px;}
  #verdict .breakdown{margin-top:16px;}
  #verdict .bk{display:inline-block; margin:3px 5px; padding:4px 12px; border-radius:20px; background:#ffffff1a; border:1px solid #ffffff33; font-size:13px; letter-spacing:.5px;}
  /* per-book reckoning: one row per book, canonical reading order, a bar for the ratio */
  #verdict .books{margin:20px auto 4px; max-width:340px; text-align:left;}
  #verdict .books h4{margin:0 0 10px; font-size:12px; letter-spacing:2px; text-transform:uppercase; color:#e8c79a; text-align:center; font-weight:normal;}
  #verdict .brow{display:flex; align-items:center; gap:10px; margin:6px 0; font-size:13px; letter-spacing:.5px;}
  #verdict .brow .bl{flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:.9;}
  #verdict .brow .bbar{flex:0 0 64px; height:5px; border-radius:3px; background:#ffffff1a; overflow:hidden;}
  #verdict .brow .bbar i{display:block; height:100%; background:#e8c79a;}
  #verdict .brow .bsc{flex:0 0 auto; font-variant-numeric:tabular-nums; opacity:.85;}
  #verdict .brow.weak .bl{color:#e8c79a; opacity:1;}
  #verdict .brow.weak .bbar i{background:#c98b8b;}
  #verdict .small{font-size:13px; opacity:.85; margin-top:16px; letter-spacing:1px;}
  #verdict button{font:inherit; margin-top:16px; background:#fbeede; color:var(--wine); border:none; border-radius:20px; padding:8px 18px; cursor:pointer; letter-spacing:1px;}
  .footnav{display:flex; gap:10px; justify-content:space-between; margin-top:34px; padding-top:18px; border-top:1px solid var(--line);}
  .footnav button{font:inherit; font-size:14px; background:var(--parch); border:1px solid var(--line); color:var(--soft); border-radius:22px; padding:9px 16px; cursor:pointer; transition:.15s;}
  .footnav button:hover:not(:disabled){border-color:var(--gold);} .footnav button:disabled{opacity:.35; cursor:default;}
  .empty{text-align:center; color:var(--soft); font-style:italic; padding:60px 20px;}

  /* P1: tactile press feedback on nav/link/action pills — :hover is invisible on
     touch, so taps gave no cue. Mirrors the quiz options' existing :active state. */
  .topbar button:active:not(:disabled), .homeacts button:active,
  .thread .lk:active:not(:disabled), .footnav button:active:not(:disabled){
    transform:scale(.98); border-color:var(--gold);
  }

  /* --- mobile (phones ≤480px) — everything above stays the desktop layout --- */
  @media (max-width:480px){
    /* P0: the Threads view's long "From … — Title" band labels were white-space:nowrap
       at 394–496px intrinsic width, forcing the whole page to scroll sideways on a
       ~343px phone content box. Let band labels wrap instead (min-content is only a
       short word, so they fit); the short home/section bands are unaffected. */
    .band span{ white-space:normal; }
    /* P1: nav/link/action pills were ~35px tall — under the 44px touch-target min. */
    .topbar button, .homeacts button, .thread .lk, .footnav button{ min-height:44px; }
    /* P1: wrapped topbar rows align left instead of spreading with ragged gaps. */
    .topbar{ justify-content:flex-start; }
    /* P1: lift the two 10px labels to 11px — the smallest text in the app. */
    .cell .st, .qkind{ font-size:11px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <div class="mark">✦ The Muse's <b>Odyssey</b> ✦</div>
    <div class="by">a reading companion for the Iliad &amp; the Odyssey</div>
    <div class="rule"></div>
  </div>
  <div class="topbar" id="topbar"></div>
  <div id="view"></div>
</div>

<script>
(function(){
  var ok=false;
  try{ var k='__loom_probe'; window.localStorage.setItem(k,'1'); window.localStorage.removeItem(k); ok=true; }
  catch(e){ ok=false; }
  if(!ok){
    var mem=Object.create(null);
    var shim={
      getItem:function(k){ k=String(k); return k in mem?mem[k]:null; },
      setItem:function(k,v){ mem[String(k)]=String(v); },
      removeItem:function(k){ delete mem[String(k)]; },
      clear:function(){ mem=Object.create(null); },
      key:function(i){ return Object.keys(mem)[i]||null; },
      get length(){ return Object.keys(mem).length; }
    };
    try{ Object.defineProperty(window,'localStorage',{configurable:true,writable:true,value:shim}); }
    catch(e){ try{ window.localStorage=shim; }catch(e2){} }
    window.__loomVolatile=true;   /* in-memory: writes vanish on reload. No streak may claim to persist. */
  }
  window.addEventListener('error',function(ev){
    var view=document.getElementById('view');
    if(view && view.innerHTML.trim()===''){
      view.innerHTML='<div style="padding:28px 22px;color:#8a3a3f;font:15px Georgia,serif;line-height:1.5;">'+
        '<b>The loom snagged.</b><br><br>'+
        String((ev && (ev.message||ev.error))||'unknown error')+
        '<br><br><span style="color:#6b5d4f;font-size:13px;">(shown so the page is not silently blank)</span></div>';
    }
  });
})();
</script>

      what: "<p>On the golden floor of Olympus, <span class='god'>Zeus</span> raises the question with a smirk: <span class='who'>Menelaus</span> has plainly won — shall we stir up war again, or seal the peace and let <span class='who'>Priam</span>'s city stand, and Helen go home? <span class='god'>Hera</span> and <span class='god'>Athena</span> sit muttering, hunched together, plotting Troy's ruin. Hera erupts: all her sweat, all her labor gathering the Greek host — and Zeus would let it come to nothing?</p>",

    "<span class='god'>Athena</span> pours fire into him and turns him loose. What follows is the poem's most dangerous experiment: a mortal raised so high by a god that he stops distinguishing gods from men — and is <i>told</i> not to, except for one. Before the day is done, Diomedes will drive his spear into the flesh of <span class='god'>Aphrodite</span> and, with Athena herself at the reins, into the belly of <span class='god'>Ares</span>. The book asks the question the whole <i>Iliad</i> circles: how close to a god can a man come before the gods slam the door?"
  ],

  terms: [
    { gk: "aristeia (ἀριστεία)", def: "a hero's day of surpassing excellence — the stretch of battle where one warrior blazes above all others, kills a named string of enemies, is wounded, prays, and rises stronger. Book 5 is the poem's first and most complete aristeia; every later one, even <span class='who'>Achilles</span>'s, is measured against Diomedes'." },
    { gk: "menos (μένος)", def: "the surge of battle-might a god breathes into a mortal — fury, force, and daring in one. Athena fills Diomedes with <i>menos</i> twice: once at the start, once after his wound, and the second dose comes with a warning attached." },
    { gk: "ichōr (ἰχώρ)", def: "the fluid that runs in a god's veins where blood runs in ours — <i>not</i> blood, because the gods eat no bread and drink no wine, and so are bloodless and deathless. When Diomedes' spear opens Aphrodite's wrist, what wells out is ichor: the poem's proof that a mortal has torn something that was never supposed to bleed." },
    { gk: "theomachia (θεομαχία)", def: "\"battle against the gods\" — a mortal raising a weapon at an immortal. Book 5 is the boldest theomachy in Homer, and also its own rebuke: <span class='god'>Apollo</span> lets Diomedes wound two gentler gods, then stops him cold with the poem's hardest lesson — <i>the deathless gods and men who walk the earth are not one kind.</i>" }
  ],

      why: "The formal opening of an aristeia — the god names her man, marks him with fire, and lets him loose. The Sirius simile is double-edged: the star is the most brilliant in the sky and the bringer of fever and death to men. Homer signals from the first lines that Diomedes' glory and the plain's slaughter are the same light."

      why: "The wound is the hinge every aristeia turns on: the hero must fall low before he rises highest. And note the enemy — Pandarus, whose bow already broke the sworn oaths, now aims it at the poem's rising hero. Homer is closing a circuit. The archer who loosed the war's first treacherous arrow has one more to loose, and it summons the thing that will end him."

      why: "The single wound the whole book was built to permit — and Homer treats it as an event of cosmic strangeness: a mortal spear opening a goddess, and something that is not blood running down a divine wrist. The ichor line is one of the poem's great definitions of what a god <i>is</i> — bloodless, breadless, deathless. Diomedes has touched that, and lived. But he touched the gentlest of the gods, by permission. The question now is whether he remembers the fence."

    "This is the book of what is at stake. Two enemies meet in the no-man's-land and, instead of killing, trade armor over an inherited friendship. <span class='who'>Hector</span> walks back through his own doomed city — past his mother, past his brother's bedroom, to his wife and infant son at the gate. He already knows, in his heart, how it all ends. He goes back to the fighting anyway. Book 6 is where the <i>Iliad</i> earns its grief."
  ],

  movements: [
    {
      n: "Movement I",
      title: "No mercy for Adrestus",
      what: "<p>With the Trojans in retreat, <span class='who'>Menelaus</span> takes Adrestus alive; the man clasps his knees and begs — his father will pay a rich ransom. Menelaus is moved and nearly yields. Then <span class='who'>Agamemnon</span> rushes up: <i>let none escape sheer death — not even the boy still in his mother's womb.</i> Menelaus shoves the suppliant away, Agamemnon spears him in the flank, and sets his heel on the corpse to wrench the shaft free.</p>",
      why: "The book opens on the war at its coldest, so that everything tender to come is measured against it. Agamemnon's total-war creed — kill the unborn — is the plain's logic in its purest, ugliest form. Homer wants that logic fresh in your mind when, a few movements later, two enemies choose <i>not</i> to kill, and a father cradles a son. This is the darkness the rest of the book pushes back against."

    {
      n: "Movement II",
      title: "The seer sends Hector home",
      what: "<p><span class='who'>Helenus</span>, Priam's son and Troy's finest augur, tells <span class='who'>Hector</span> to steady the line — then to leave the field and go up into the city. He must bid their mother <span class='who'>Hecuba</span> gather the noble women at <span class='god'>Athena</span>'s temple, lay the loveliest robe on the goddess's knees, and vow twelve yearling heifers, if only Athena will pity Troy and hold back <span class='who'>Diomedes</span>, who is raging <i>like no man they have faced.</i></p>",
      why: "The errand is what pulls Hector off the battlefield and into the heart of the book — the whole domestic movement hangs on it. And notice its cause: the Greeks so fear Diomedes after Book 5 that Troy's only hope seems to be prayer. The aristeia we just watched is now a shadow over the city, driving its women to their knees before an altar."

    {

      title: "Glaucus and Diomedes — leaves, and an old debt",
      what: "<p>In the gap between the armies, <span class='who'>Diomedes</span> — wary of gods after his day — asks the man before him who he is. <span class='who'>Glaucus</span> answers with the great simile: <i>like the generations of leaves are the generations of men</i>, one budding as another falls. Then his lineage — down to <span class='who'>Bellerophon</span>, sent to Lycia carrying a folded tablet of <i>murderous signs</i> meant to kill him, who slew the Chimaera and survived. Diomedes plants his spear in the ground, delighted: their grandfathers were guest-friends — <span class='who'>Oeneus</span> once hosted Bellerophon twenty days. <b>They are friends by inheritance.</b> They clasp hands, swear to avoid each other in the fighting, and trade armor — though <span class='god'>Zeus</span> steals Glaucus's wits, for he swaps gold gear for bronze, a hundred oxen's worth for nine.</p>",
      why: "The still center of the <i>Iliad</i>. In the middle of a killing field, two men discover that a bond of <i>xenia</i> older than either of them outranks the war, and they honor it. Set it against Book 3: <span class='who'>Paris</span> broke exactly this bond — he was <span class='who'>Menelaus</span>'s guest and stole his wife and his treasure. The whole war is a debt of violated guest-friendship; here, two enemies pay a different debt of it the right way. The comic detail of the lopsided trade keeps it human — honor, not calculation, and Homer smiles at the cost."
    },
    {

      title: "Hector in the city — the cup refused",
      what: "<p><span class='who'>Hector</span> enters Troy, and the women run to him crying for news of sons and husbands. His mother <span class='who'>Hecuba</span> offers honeyed wine — pour to <span class='god'>Zeus</span>, then drink and rest your limbs. Hector refuses both: wine would sap the strength he needs, and he dares not pour libation to Zeus with hands unwashed and spattered with blood. He gives her the errand instead — gather the women, take the finest robe to Athena's temple, and pray.</p>",
      why: "A small scene doing quiet work. Hector will not be softened, not by wine, not by rest, not by his mother's care — he holds himself apart from every comfort the city offers because he cannot afford it. The unwashed, bloody hands are the mark of the man the war has made: he no longer fully belongs to the peaceful house he is standing in. Every reunion in this book is also a small leave-taking."

      what: "<p>The women of Troy do exactly as bidden. The priestess <span class='who'>Theano</span> lays the great robe across the knees of <span class='god'>Athena</span>'s image and lifts the prayer: pity the city, hold back <span class='who'>Diomedes</span>, and twelve heifers shall be yours. <i>So she prayed — but Pallas Athena turned her head away.</i></p>",
      why: "One of the bleakest half-lines in the poem, and Homer spends no more words on it than that. The mothers do everything right; the goddess simply refuses, silently, and the narrative moves on. It is the divine machinery of Book 5 seen from below — the same Athena who drove Diomedes' spear will not be bought back by any robe. The reader knows the prayer is dead before the women rise from their knees."

    {
      n: "Movement VI",
      title: "Paris, Helen, and the bedroom by the war",
      what: "<p><span class='who'>Hector</span> climbs to <span class='who'>Paris</span>'s house and finds him fondling his splendid armor while <span class='who'>Helen</span> sits among her women. Hector's rebuke is bitter: the city burns for you, and you sulk here. Paris takes it mildly — Helen has just now urged him back to the fight; he will arm. Helen turns on herself hardest of all, calling herself a dog and a curse, wishing the winds had swept her away the day she was born; she begs Hector to sit and rest from the labor her shame has brought. He will not: his heart is with the men dying for this house.</p>",
      why: "The direct return of Book 3's bedroom, where <span class='god'>Aphrodite</span> lifted Paris from the duel he was losing and set him beside Helen. Now Hector drags that same room back into the war it tried to hide from. Helen's self-loathing has only deepened — she sees herself clearly and can do nothing. And the contrast is merciless: Paris polishing armor he barely uses, Hector unable to sit for the weight of the fighting. Two brothers, one city, one impossible war."

    {
      n: "Movement VII",
      title: "The farewell at the Scaean Gates",
      what: "<p><span class='who'>Hector</span> seeks his wife at home, but <span class='who'>Andromache</span> has run to the wall in terror, the nurse beside her carrying their baby. They meet at the gates. She pours out her whole grief: <span class='who'>Achilles</span> killed her father and seven brothers in one day and took her mother — <i>Hector, you are my father now, and my mother, and my brother, and you are my husband too.</i> Stay on the wall, she begs; do not make your son an orphan. Hector answers that he cannot hide for shame before Troy — yet he knows in his bones the day will come when sacred Ilium falls and she is dragged off a slave to weave at another woman's loom; the thought of <i>her</i> chains grieves him more than all Troy's dead. He reaches for the child — who screams, terrified by the bronze and the horsehair crest nodding on the helmet. Both parents laugh through it. Hector lifts off the helmet, kisses his boy, and prays: <i>let them say of him one day, he is better by far than his father.</i></p>",
      why: "The emotional summit of the whole poem so far, and its argument in miniature. Andromache has already lost every family the war could take; Hector is the last, and he is choosing to risk himself for <i>aidōs</i> — the shame he'd feel hanging back — even while foreseeing, in detail, the ruin his death will unleash on her. The baby's fright at the helmet is the truest stroke: the war-gear that makes Hector a hero makes him a monster to his own son, and he has to strip it off to be a father for one moment. Homer shows you, in a single family, the entire cost the plain has been tallying anonymously."

    {
      n: "Movement VIII",
      title: "The stallion breaks loose",

      why: "Homer closes the city-book by pointing it back at the war, and does it with one of his most physical similes — Paris's caged energy finally loosed. The image is glorious and faintly damning at once: a beautiful animal running to no purpose but its own delight, the man whose appetite began this whole ruin now sprinting eagerly to feed it. And Hector, who wants none of it, walks beside him. The gates close on the family; the plain reopens."

      why: "Homer resets the board. After the god-drenched chaos of Book 5 and the human intimacy of Book 6, he narrows the whole war to two men in a ring of watchers. And notice who arranges it: the gods, bored or weary of mass death, stage a duel for their own reasons. Even the noblest human contest in the book is, from above, a spectacle the gods set up — and Helenus's promise that Hector won't die today quietly tells us the duel is safe theater before it begins."

      why: "The silence is the point. Hector has just come from the gates a resolved and terrible man, and no Greek wants him. Menelaus's rash volunteering — the wronged husband, the whole war's supposed cause — would be suicide, and Agamemnon's restraining hand shows how much the Greeks have shrunk in Achilles' absence. The army that once fielded an unstoppable Diomedes now needs shaming into producing a single champion."

      title: "Nestor shames them into nine",

      why: "The gods, through the lot, hand the Greeks their best possible defender: not the brilliant Diomedes nor a king, but Ajax — the wall of a man, all endurance and mass. It is a beautifully fitting choice for a duel that will end not in death but in stalemate. Homer even lets Hector feel fear, restoring some balance after Book 6 made us love Hector; now we are reminded he is mortal, and there are men on the plain who can match him."

    {

      title: "The duel — and the dark falls",
      what: "<p>They close. Spears are hurled and bite shield-bronze; <span class='who'>Ajax</span>'s tower-shield turns Hector's cast, and his own drives through Hector's shield and grazes his neck. They snatch up boulders — Hector's cracks against the great shield's boss; Ajax heaves a millstone of a rock that smashes Hector's shield inward and knocks him flat, and <span class='god'>Apollo</span> hauls him back to his feet. They draw swords for the kill — and the heralds step in: <span class='who'>Idaeus</span> of Troy and <span class='who'>Talthybius</span> of the Greeks hold their staves between the men. <i>Night is coming; it is good to yield to night.</i> Hector agrees, and proposes they part with gifts, so men will always say these two fought and yet honored each other. He gives Ajax a silver-studded sword with its scabbard and baldric; Ajax gives Hector a war-belt bright with purple.</p>",

    {
      n: "Movement I",
      title: "The ban, and the golden cord",
      what: "<p>At dawn <span class='god'>Zeus</span> gathers the gods and forbids them all to touch the war — <i>whoever I catch helping either side comes back to Olympus lightning-struck, or I fling him down to Tartarus.</i> To silence any thought of resistance he lays out the golden cord: let every god and goddess grip it and pull, and they could not drag him down; but let him choose to pull, and he would haul the lot of them up with the earth and sea besides. The gods sit stunned. Only <span class='god'>Athena</span> ventures a word — they will keep clear of the fighting, but may they at least <i>advise</i> the Greeks? Zeus softens, half-smiling, and lets it stand. Then he drives to Ida to watch.</p>",

  recap: [
    "Nine books in, the war has turned hard against the Greeks. <b>Zeus</b>, paying the debt he owed <b>Thetis</b> since Book 1, thundered the Achaeans into rout; <b>Hector</b>'s army now camps on the open plain, campfires blazing within reach of the ships. That night an embassy begged <b>Achilles</b> to return — and he refused every gift, tying his return to a single condition: he will not move until the fighting reaches his own hull.",

  movements: [

      n: "Movement I",

      why: "Homer opens on dread, not action — the high king reduced to a shivering insomniac, watching the fires of the men who beat him. It is the human aftertaste of Book 8's rout, and it sets the book's whole register: this is fear-work, done at night by men who cannot sleep, not the confident daylight of the earlier battles. The war has gotten inside them."

    },
    {
      n: "Movement III",
      title: "Arming for the dark",
      what: "<p>They arm not for glory but for stealth — no gleaming bronze to catch the firelight. <span class='who'>Diomedes</span> takes a sword and a plain leather cap; <span class='who'>Odysseus</span> is given a bow, a sword, and the famous <b>boar's-tusk helmet</b>, an heirloom Homer pauses to trace through a whole lineage of owners and thefts. <span class='god'>Athena</span> sends them an omen — a heron off to the right in the dark; they cannot see it but hear its cry, and take heart. Odysseus prays to her, Diomedes too, each vowing a sacrifice, and they slip out <i>like two lions through the black night, through the carnage and the blood.</i></p>",
      why: "The dark, dull gear is the whole point: these are not shining champions but night-raiders dressed to disappear. Homer's loving digression on the boar's-tusk helmet — an object older than the war it appears in — gives the scene a strange archaeological depth, as if the poem reaches back past itself. And the heron <i>heard but not seen</i> is the perfect omen for this book: even the gods' signs come in the dark, by ear, uncertain."

    {

      title: "Hector's spy — Dolon's fatal bargain",
      what: "<p>On the other side, <span class='who'>Hector</span> calls his own council and asks for a volunteer to creep to the Greek ships and learn whether they still guard them or, beaten, plan to flee. He dangles a huge reward: the finest chariot and horses in the whole Achaean camp — <i>the immortal team of Achilles himself.</i> A rich young Trojan named <span class='who'>Dolon</span>, an only son and ugly but swift-footed, leaps at it and makes Hector swear the horses will be his. He throws a grey wolf-skin over his back, caps his head in marten-fur, takes a bow, and trots off toward the ships.</p>",

      why: "<p>The danger here is not violence but sweetness - a temptation that erases nostos by erasing the will to want it. It is the gentlest warning in the book and one of the clearest: even a painless forgetting is a kind of death for a man whose whole story is the wish to get home.</p>"

      why: "<p>Odysseus' curiosity is the hinge of the whole book - nothing forces him into that cave. He goes looking for xenia in a land the poem has already told us keeps none, the first sign that his own judgment, not only monsters, will cost him here.</p>"

      why: "<p>This is xenia inverted at the root: the guest-gift Odysseus hoped for becomes his own men's bodies, eaten. The sealed boulder makes the horror literal - they are trapped inside the anti-host's house with no door they can open themselves.</p>"

      n: "Movement VI",

  recap: [
    "While <b>Telemachus</b> searched Pylos and Sparta for word of his father, <b>Athena</b> pressed <b>Zeus</b> to free <b>Odysseus</b> from seven years' captivity on <b>Calypso</b>'s island. Freed at last, he built a raft, was wrecked by a storm <b>Poseidon</b> raised against him, and swam ashore on <b>Scheria</b>, land of the seafaring Phaeacians. There, in <b>Alcinous</b>'s hall, a bard's song of Troy's fall moved him to tears - and, pressed at last for his name, he began the story of everything since.",

    {
      n: "Movement VI",

    "Cast up alone on the Phaeacian shore, <b>Odysseus</b> found shelter with King <b>Alcinous</b> and Queen <b>Arete</b>, and across three long nights told them everything: the Cicones, the Lotus-eaters, the <b>Cyclops</b> Polyphemus he blinded and who cursed him in his father <b>Poseidon</b>'s name, Aeolus and the bag of winds let loose too soon, the Laestrygonians who wrecked eleven of his twelve ships, <b>Circe</b>'s island, the crossing to the dead to hear the seer <b>Tiresias</b>, the Sirens, Scylla and Charybdis, and at Thrinacia the crew's forbidden slaughter of the Sun god's cattle - the crime that cost every last companion his life.",

    {
      n: "Movement II",
      title: "A ship turned to stone",
      what: "<p>The Phaeacian sailors lay the sleeping <span class='who'>Odysseus</span> and his treasure on Ithaca's sand and turn for home. <span class='god'>Poseidon</span>, furious that the Phaeacians ferry any stranger across the sea without cost or danger to themselves, asks <span class='god'>Zeus</span> for leave to punish them. Zeus grants it, and as the returning ship comes in sight of its own harbor, Poseidon turns it to stone. Alcinous recalls an old prophecy that this would happen one day, and the Phaeacians vow to stop escorting strangers home.</p>",

  recap: [
    "<span class='who'>Odysseus</span> told the Phaeacians the whole of his wanderings - the Cyclops, Circe, the House of the Dead, the Sirens, Scylla and Charybdis, the cattle of the Sun - and they carried him home by ship while he slept, setting him on Ithaca's own shore laden with parting gifts. <b>Athena</b> met him there, then disguised him as a filthy old beggar and sent him not to his hall but up into the hills, to the hut of his loyal swineherd <b>Eumaeus</b>. For two books now Odysseus has eaten at his own servant's table unrecognized, testing loyalty before he risks his life.",

      why: "The dogs are the poem's small, exact proof of belonging - Ithaca still knows its own even where its king does not. Eumaeus' welcome is the xenia the suitors never learned, offered here to a boy instead of a beggar. And the scene quietly sets its irony: the only two people in the room who are father to this house cannot yet see each other."

    {
      n: "Movement II",

      n: "Movement V",

<script>
/* The only thing in the loom that knows what day it is.
   Pure: no storage, no DOM. Local date parts throughout — toISOString() is UTC
   and would roll the day over at 20:00 EDT, breaking a streak the reader kept. */
(function (root) {
  'use strict';

  const p2 = n => String(n).padStart(2, '0');

  function todayKey(d) {
    d = d || new Date();
    return d.getFullYear() + '-' + p2(d.getMonth() + 1) + '-' + p2(d.getDate());
  }

  function parseKey(key) {
    const [y, m, d] = key.split('-').map(Number);
    return new Date(y, m - 1, d);   // local midnight
  }

  function prevKey(key) {
    const d = parseKey(key);
    d.setDate(d.getDate() - 1);     // handles month/year/DST rollover
    return todayKey(d);
  }

  function streakNext(prev, today) {
    if (!prev || !prev.lastDay) return { count: 1, lastDay: today };
    if (prev.lastDay === today) return { count: prev.count, lastDay: today };
    if (prev.lastDay === prevKey(today)) return { count: prev.count + 1, lastDay: today };
    return { count: 1, lastDay: today };
  }

  function daysUntil(targetKey, fromKey) {
    const t = parseKey(targetKey);
    const f = parseKey(fromKey || todayKey());
    return Math.round((t - f) / 86400000);   // round absorbs DST's 23/25-hour days
  }

  /* Precise, absolute-instant countdown for the final night. targetMs/nowMs are
     epoch milliseconds (UTC), so the gap is real elapsed time — timezone- and
     DST-proof. The "7:30 PM ET" label lives in the view; here we only measure. */
  function timeLeft(targetMs, nowMs) {
    const diff = targetMs - (nowMs == null ? Date.now() : nowMs);
    const total = Math.max(0, diff);
    return {
      past: diff <= 0,                         // at or after the instant
      ms: diff,
      h: Math.floor(total / 3600000),          // total hours (may exceed 24)
      m: Math.floor(total / 60000) % 60,
      s: Math.floor(total / 1000) % 60
    };
  }

  // Human phrase for the gap, coarsening as it widens. null once the door opens.
  function countdownLabel(targetMs, nowMs) {
    const t = timeLeft(targetMs, nowMs);
    if (t.past) return null;
    const d = Math.floor(t.h / 24), h = t.h % 24;
    if (d >= 1) return d + 'd ' + h + 'h';
    if (t.h >= 1) return t.h + 'h ' + t.m + 'm';
    if (t.m >= 1) return t.m + 'm ' + t.s + 's';
    return t.s + 's';
  }

  const api = { todayKey, prevKey, streakNext, daysUntil, timeLeft, countdownLabel };
  if (typeof module !== 'undefined' && module.exports) module.exports = api;
  if (typeof window !== 'undefined') window.LOOM_CLOCK = api;
})(this);
</script>
<script>
/* Derived omens: questions generated from data the books already carry.
   Pure — no storage, no DOM. Every generator returns null when its pool is too
   thin, so a reader one book in simply sees fewer omens rather than a crash.

   Callers must pass only books the reader has read. The spoiler gate lives at
   the call site, exactly as it does for collectCast(). */
(function (root) {
  'use strict';

  /* An epithet that names a kinsman answers itself: "son of Peleus" IS Achilles.
     Such epithets are fine roster glosses and useless quiz prompts, so they are
     filtered here rather than corrected in the data.

     Two constructions appear in the corpus:
       "grandson of Bellerophon"        — kinship word, then "of", then a name
       "Achilles' foster-father"        — a possessive name, then a kinship word
                                          (straight ' and typographic ' both match)
     Note "of the Greek host" must NOT match: no person is named. Nor must
     "Paris's patron" — possessive, but "patron" is no kin. */
  const KIN = "(?:foster-|step-|half-|grand|great-grand)?(?:son|daughter|father|mother|brother|sister)|wife|husband";
  const KINSHIP = new RegExp(
    "\\b(?:" + KIN + ")\\s+of\\s+[A-Z]" +
    "|[A-Z][\\p{L}]*(?:['’']s|['’'])\\s+(?:" + KIN + ")\\b",
    "u"
  );
  const isKinshipEpithet = ep => KINSHIP.test(ep || '');

  const bandOf = (group, c) =>
    (String(group).toLowerCase().includes('god') || c.god) ? 'gods' : 'mortals';

  function shuffle(arr, rng) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  /* name -> [{ep, book}], per band. Keyed by CHARACTER, not by pair: Athena
     carries two epithet variants, and drawing distractors by pair would let her
     stand as her own distractor. */
  function epithetPool(books) {
    const out = { mortals: new Map(), gods: new Map() };
    books.forEach(({ id, data }) => {
      const chars = (data && data.characters) || {};
      Object.keys(chars).forEach(group => {
        (chars[group] || []).forEach(c => {
          const ep = (c.epithet || '').trim();
          if (!ep || isKinshipEpithet(ep)) return;
          const m = out[bandOf(group, c)];
          if (!m.has(c.name)) m.set(c.name, []);
          const list = m.get(c.name);
          if (!list.some(x => x.ep === ep)) list.push({ ep, book: id });
        });
      });
    });
    return out;
  }

  /* "Whose name does the Loom hide?" Distractors come from the SAME band, or the
     word "goddess" alone eliminates three mortals. Drawn by character, so a
     two-variant name like Athena can never appear twice. */
  function epithetOmen(pool, opts) {
    const rng = opts.rng, label = opts.label;
    const bands = ['mortals', 'gods'].filter(b => pool[b].size >= 4);
    if (!bands.length) return null;

    const band = bands[Math.floor(rng() * bands.length)];
    const names = shuffle(Array.from(pool[band].keys()), rng);
    const answer = names[0];
    const variants = pool[band].get(answer);
    const chosen = variants[Math.floor(rng() * variants.length)];

    const choices = shuffle([answer, names[1], names[2], names[3]], rng);
    return {
      format: 'choice',
      kind: 'meaning',
      q: 'Whose name does the Loom hide? <i>' + chosen.ep + '</i>',
      opts: choices,
      correct: choices.indexOf(answer),
      truth: '<b>' + answer + '</b> — ' + chosen.ep + '. <span class="small">' + label(chosen.book) + '</span>'
    };
  }

  /* movements[] is already an ordered list of self-contained beats, so it is a
     question bank with its answer key built in. Titles are deduped defensively:
     findIndex below assumes they are unique. */
  function sequenceOmen(book, rng) {
    const mv = (book.data && book.data.movements) || [];
    const seen = new Set();
    const uniq = [];
    mv.forEach((m, i) => {
      if (m && m.title && !seen.has(m.title)) {
        seen.add(m.title);
        uniq.push({ i, title: m.title });
      }
    });
    if (uniq.length < 4) return null;

    const spread = [];
    for (let a = 0; a < uniq.length; a++) {
      for (let b = a + 2; b < uniq.length; b++) {
        for (let c = b + 2; c < uniq.length; c++) {
          for (let d = c + 2; d < uniq.length; d++) {
            spread.push([uniq[a], uniq[b], uniq[c], uniq[d]]);
          }
        }
      }
    }
    const picked = spread.length >= 3
      ? spread[Math.floor(rng() * spread.length)]
      : shuffle(uniq, rng).slice(0, 4);
    const items = shuffle(picked, rng);
    const trueOrder = picked.slice().sort((a, b) => a.i - b.i);
    const answer = trueOrder.map(t => items.findIndex(x => x.i === t.i));

    return {
      format: 'sequence',
      kind: 'event',
      q: 'The Loom shows four beats. Set them in their true order.',
      items: items.map(x => x.title),
      answer: answer,
      truth: trueOrder.map((t, k) => (k + 1) + '. ' + t.title).join('<br>')
    };
  }

  /* Split on whitespace AND em/en dashes: "Rage—Goddess" is two words, and a naive
     strip of non-letters would fuse them into "RageGoddess". Trailing/leading
     punctuation is shaved; internal hyphens ("chariot-driven") survive. */
  const DASHES = /[\s—–]+/;
  const tokenize = t => t.split(DASHES)
    .map(w => w.replace(/^[^\p{L}]+|[^\p{L}]+$/gu, ''))
    .filter(Boolean);

  /* Function words make dull prompts: "which word is missing? their" */
  const STOP = new Set(['their', 'there', 'those', 'these', 'which', 'would', 'could', 'should', 'about', 'whole', 'through']);
  const isCandidate = w => w.length >= 5 && !STOP.has(w.toLowerCase());

  function lineOmen(book, allBooks, rng) {
    const ep = book.data && book.data.meta && book.data.meta.epigraph;
    if (!ep || !ep.text) return null;

    /* Split with a CAPTURING group so separators survive in the array. Rejoining on
       ' ' would turn Fagles' em-dash into a space, silently altering a verbatim
       quotation. Even indices are tokens, odd are the exact separators that stood
       between them. */
    const parts = ep.text.split(/([\s—–]+)/);
    const isSep = s => /^[\s—–]+$/.test(s);
    const wordCounts = tokenize(ep.text).reduce((counts, w) => {
      const lw = w.toLowerCase();
      counts[lw] = (counts[lw] || 0) + 1;
      return counts;
    }, {});
    const cands = parts
      .map((w, i) => ({ i, raw: w, clean: w.replace(/^[^\p{L}]+|[^\p{L}]+$/gu, '') }))
      .filter(x => !isSep(x.raw) && isCandidate(x.clean) && wordCounts[x.clean.toLowerCase()] === 1)
      .filter(x => {
        const testShown = parts.slice();
        testShown[x.i] = x.raw.replace(x.clean, '____');
        return !testShown.join('').toLowerCase().includes(x.clean.toLowerCase());
      });
    if (!cands.length) return null;

    const pick = cands[Math.floor(rng() * cands.length)];

    const visible = new Set(tokenize(ep.text).map(w => w.toLowerCase()));
    const foreign = [];
    const seen = new Set();
    allBooks.forEach(b => {
      if (b.id === book.id) return;
      const t = b.data && b.data.meta && b.data.meta.epigraph;
      if (!t || !t.text) return;
      tokenize(t.text).forEach(w => {
        const lw = w.toLowerCase();
        if (!isCandidate(w) || visible.has(lw) || seen.has(lw)) return;
        seen.add(lw);
        foreign.push(w);
      });
    });
    if (foreign.length < 3) return null;

    const distract = shuffle(foreign, rng).slice(0, 3);
    const choices = shuffle([pick.clean].concat(distract), rng);

    const shown = parts.slice();
    shown[pick.i] = pick.raw.replace(pick.clean, '____');

    return {
      format: 'choice',
      kind: 'meaning',
      q: (ep.verbatim === true ? 'Fagles wrote it thus.' : 'The Loom recalls the line.') +
        ' Which word is missing?<br><i>' + shown.join('') + '</i>',
      opts: choices,
      correct: choices.indexOf(pick.clean),
      truth: '<b>' + pick.clean + '</b> — ' + (ep.src || '')
    };
  }

  /* The Daily Rite: a mixed draw across every read book. Derived omens first (they
     are the new flavor), then authored omens fill to n, then the whole draw is
     shuffled so the sequence question is not always at the top. */
  function dailyRite(books, opts) {
    books = (books || []).filter(b => b && b.data);
    opts = opts || {};
    const n = opts.n || 5;
    const rng = opts.rng || Math.random;
    const label = opts.label || (id => id);
    if (!books.length) return [];

    const anyBook = () => books[Math.floor(rng() * books.length)];
    const draw = [
      sequenceOmen(anyBook(), rng),
      epithetOmen(epithetPool(books), { rng, label }),
      lineOmen(anyBook(), books, rng)
    ].filter(Boolean);

    const authored = [];
    books.forEach(b => (b.data.quiz || []).forEach((item, qi) => {
      authored.push(Object.assign({}, item, { format: 'choice', srcId: b.id, qi }));
    }));

    const need = Math.max(0, n - draw.length);
    const filled = draw.concat(shuffle(authored, rng).slice(0, need));
    return shuffle(filled, rng).slice(0, n);
  }

  const api = { isKinshipEpithet, bandOf, shuffle, epithetPool, epithetOmen, sequenceOmen, lineOmen, dailyRite };
  if (typeof module !== 'undefined' && module.exports) module.exports = api;
  if (typeof window !== 'undefined') window.LOOM_OMENS = api;
})(this);
</script>
<script>
/* ---- data registry ---- */
window.LOOM_DATA = window.LOOM_DATA || {};

for(let i=1;i<=24;i++) PLAN.push({ id:`iliad-${pad(i)}`,   epic:"The Iliad",   short:"Iliad",   n:i });
for(let i=1;i<=24;i++) PLAN.push({ id:`odyssey-${pad(i)}`, epic:"The Odyssey", short:"Odyssey", n:i });
const ORDER = PLAN.map(p => p.id);

/* quiz kinds — the two comprehension layers, plus the cross-book thread */

  event:   { label:"Event recall",  cls:"k-event"   },
  meaning: { label:"Why it matters", cls:"k-meaning" },
  thread:  { label:"Cross-book thread", cls:"k-thread" }
};

let current=null;
const authored = id => !!window.LOOM_DATA[id];
const isRead = id => localStorage.getItem('loom.read.'+id)==='1';
const setRead = (id,v) => localStorage.setItem('loom.read.'+id, v?'1':'0');
const bestScore = id => { const v=localStorage.getItem('loom.best.'+id); return v==null?null:+v; };
const saveScore = (id,s) => { const b=bestScore(id); if(b==null||s>b) localStorage.setItem('loom.best.'+id, s); };
const priorMiss = id => { try{ return JSON.parse(localStorage.getItem('loom.miss.'+id)||'[]'); }catch(e){ return []; } };
const saveMiss = (id,arr) => localStorage.setItem('loom.miss.'+id, JSON.stringify(arr));

/* ---- the day log: the first thing in the loom that knows what day it is ----
   Written ONLY from toggleRead() and the per-book reveal(), both of which fire
   only on a human action. seedProgress() writes read/best flags and never calls
   the day recorder, so seeded books are an undated past: they count toward
   lifetime totals and can never complete a day or begin a streak.

   The Daily Rite and the Grand Examination must NOT write this log. Only a
   per-book sitting can advance a day. */
const DEADLINE = '2026-07-15';
const DEADLINE_TS = Date.UTC(2026, 6, 15, 23, 30, 0);   // 7:30 PM ET (EDT, UTC-4) — the curtain
const PASS_RATIO = 0.7;
const dayKey = k => 'loom.day.' + k;

function durable(){
  if(typeof window !== 'undefined' && window.__loomVolatile) return false;
  try{
    localStorage.setItem('__loom_durable','1');
    const ok = localStorage.getItem('__loom_durable')==='1';
    localStorage.removeItem('__loom_durable');
    return ok;
  }catch(e){ return false; }
}

function dayEntry(k){
  try{ return JSON.parse(localStorage.getItem(dayKey(k)) || '{"read":[],"sat":[]}'); }
  catch(e){ return {read:[],sat:[]}; }
}
function goalBooks(){
  try{ return (JSON.parse(localStorage.getItem('loom.goal')||'{}').books) || 1; }
  catch(e){ return 1; }
}
function setGoalBooks(n){
  try{ localStorage.setItem('loom.goal', JSON.stringify({books: Math.max(1, n|0)})); }catch(e){}
}
function readStreak(){
  try{ return JSON.parse(localStorage.getItem('loom.streak')||'null'); }catch(e){ return null; }
}

function bookPasses(id){
  const d = window.LOOM_DATA[id];
  const total = (d && d.quiz) ? d.quiz.length : 0;
  const best = bestScore(id);
  return total > 0 && best != null && best >= PASS_RATIO * total;
}

function booksDoneOn(k){
  const e = dayEntry(k);
  const touched = {};
  e.read.concat(e.sat).forEach(id => { touched[id] = true; });
  return Object.keys(touched).filter(id => isRead(id) && bookPasses(id)).length;
}
const booksDoneToday = () => booksDoneOn(LOOM_CLOCK.todayKey());
const dayComplete = k => booksDoneOn(k) >= goalBooks();

function recordDay(kind, id){
  const k = LOOM_CLOCK.todayKey();
  const e = dayEntry(k);
  if(e[kind].indexOf(id) < 0) e[kind].push(id);
  try{ localStorage.setItem(dayKey(k), JSON.stringify(e)); }catch(err){}
  if(dayComplete(k)){
    try{ localStorage.setItem('loom.streak', JSON.stringify(LOOM_CLOCK.streakNext(readStreak(), k))); }catch(err){}
  }
}

/* ---- authored progress seed ----
   No cross-device sync (that work is deferred — see
   docs/superpowers/plans/2026-07-06-future-user-auth-fastapi.md). Instead we bake
   baseline progress into the app so books already read + quizzed show as done on
   every device. Completion migrations run once per browser, so they can mark the
   current reading milestone without overriding future local choices on reload.
   Maintain by hand, deep-dive style: finish a book, add `id: <omen count>` below
   and redeploy. Score = the book's omen count (a perfect sitting). */
(function seedProgress(){
  const SEED = {
    'iliad-01':6, 'iliad-02':6, 'iliad-03':6, 'iliad-04':6,
    'iliad-05':6, 'iliad-06':6, 'iliad-07':6, 'iliad-08':6,
    'iliad-09':6, 'iliad-10':6, 'iliad-11':4, 'iliad-12':4,
    'iliad-13':4, 'iliad-14':4, 'iliad-15':4, 'iliad-16':4,
    'iliad-17':4, 'iliad-18':4, 'iliad-19':4, 'iliad-20':4,
    'iliad-21':4, 'iliad-22':4, 'iliad-23':4, 'iliad-24':4,
    'odyssey-01':6, 'odyssey-02':6, 'odyssey-03':7, 'odyssey-04':6,
    'odyssey-05':6, 'odyssey-06':6, 'odyssey-07':6, 'odyssey-08':6,
    'odyssey-09':6, 'odyssey-10':6, 'odyssey-11':6, 'odyssey-12':6,
    'odyssey-13':6, 'odyssey-14':6, 'odyssey-15':6, 'odyssey-16':6,
    'odyssey-17':6, 'odyssey-18':6, 'odyssey-19':6, 'odyssey-20':6,
    'odyssey-21':6, 'odyssey-22':7, 'odyssey-23':6, 'odyssey-24':6
  };   // id → best score (= perfect)
  const migration = 'loom.seed.all-complete.v1';
  try {
    const shouldComplete = localStorage.getItem(migration)==null;
    for(const id in SEED){
      if(shouldComplete || localStorage.getItem('loom.read.'+id)==null) localStorage.setItem('loom.read.'+id,'1');
      if(shouldComplete || localStorage.getItem('loom.best.'+id)==null || +localStorage.getItem('loom.best.'+id) < SEED[id]) localStorage.setItem('loom.best.'+id, String(SEED[id]));
      if(shouldComplete || localStorage.getItem('loom.miss.'+id)!=null) localStorage.removeItem('loom.miss.'+id);
    }
    if(shouldComplete) localStorage.setItem(migration,'1');
  } catch(e){ /* locked-down origin (raw file://): harness shim covers the bundle */ }
})();
const clearMiss = (id,qi) => saveMiss(id, priorMiss(id).filter(x=>x!==qi));
function allMisses(){
  const out=[];
  ORDER.filter(authored).forEach(id=>{
    const d=window.LOOM_DATA[id];
    priorMiss(id).forEach(qi=>{ if(d.quiz && d.quiz[qi]) out.push({id, qi, item:d.quiz[qi]}); });
  });
  return out;
}
const planOf = id => PLAN.find(p=>p.id===id);
const label = id => { const p=planOf(id); return p ? `${p.short} · Book ${p.n}` : id; };

function boot(){
  const last = localStorage.getItem('loom.last');
  if(last && authored(last)) showBook(last); else showHome();
}

/* The final-night ticker: while the home countdown is on screen, refresh it every
   second so "Atropos arrives in Xh Ym" stays live. Null-safe on every other view;
   when 7:30 PM ET passes with the door in view, re-render into "the door has opened". */
setInterval(() => {
  const el = document.querySelector('.door[data-countdown]');
  if(!el) return;
  const dr = doorText();
  if(dr.live) el.textContent = dr.text;
  else if(current === null) showHome();
}, 1000);

/* ---- HOME ---- */
/* Lachesis allots the measure; Atropos waits at the door. The pace line counts
   only books that are authored and unread, so unwritten future books do not
   inflate the day's burden. */
function bumpGoal(delta){ setGoalBooks(goalBooks() + delta); showHome(); }

/* The Atropos line, shared by the first render and the live ticker below.
   Far out → poetic day count; the final day → a ticking countdown to 7:30 PM ET;
   after the curtain → the door has opened. */
function doorText(){
  const left = ORDER.filter(id => authored(id) && !isRead(id)).length;
  const days = LOOM_CLOCK.daysUntil(DEADLINE);
  if(days > 0){
    return { live:false, text:`Atropos waits ${days} day${days===1?'':'s'} hence · ` +
      (left>0 ? `${left} book${left===1?'':'s'} on the loom, unread` : 'every written book is read') };
  }
  const label = LOOM_CLOCK.countdownLabel(DEADLINE_TS);
  if(label){
    return { live:true, text:`Atropos arrives in ${label} · the theater door opens at 7:30 PM ET` +
      (left>0 ? ` · ${left} unread` : '') };
  }
  return { live:false, text:`The theater door has opened · ` +
    (left>0 ? `${left} book${left===1?'':'s'} unread` : 'every written book was read') };
}

function riteCard(){
  const goal = goalBooks();
  const done = booksDoneToday();

  let h = `<div class="rite"><div class="hd">The day's measure</div>`;
  h += `<div class="goal"><b>${done}</b> of <b>${goal}</b> book${goal===1?'':'s'} today`;
  h += ` <button class="adj" onclick="bumpGoal(-1)" aria-label="fewer books">-</button>`;
  h += ` <button class="adj" onclick="bumpGoal(1)" aria-label="more books">+</button></div>`;
  h += done >= goal
    ? `<div class="meta">The thread is spun. The day is kept.</div>`
    : `<div class="meta">A book is kept when it is read and its omens hold.</div>`;

  if(durable()){
    const s = readStreak();
    const c = s ? s.count : 0;
    h += c > 0
      ? `<div class="streak">✦ ${c} day${c===1?'':'s'} unbroken</div>`
      : `<div class="streak">✦ the thread waits to be spun</div>`;
  }else{
    h += `<div class="meta">This copy cannot keep a streak — open it from the web to have the Fates remember.</div>`;
  }

  const dr = doorText();
  h += `<div class="door"${dr.live ? ' data-countdown="1"' : ''}>${dr.text}</div>`;
  return h + `</div>`;
}

function showHome(){
  current=null;
  localStorage.removeItem('loom.last');
  document.getElementById('topbar').innerHTML='';
  const authoredAll = PLAN.filter(p=>authored(p.id)).length;
  const readAll = PLAN.filter(p=>isRead(p.id)).length;
  const threadCount = ORDER.filter(authored).reduce((s,id)=> s + ((window.LOOM_DATA[id].threads||[]).length), 0);
  const examCount = ORDER.filter(authored).reduce((s,id)=> s + ((window.LOOM_DATA[id].quiz||[]).length), 0);
  let h='';
  const missCount = allMisses().length;
  const castN = castCount();
  h += `<div class="progress">${authoredAll} of 48 books on the loom · ${readAll} read</div>`;
  h += `<div class="progbar"><i style="width:${(authoredAll/48*100).toFixed(1)}%"></i></div>`;
  h += riteCard();
  if(examCount || threadCount || missCount || castN){
    h += `<div class="homeacts">`;
    if(readAll)     h += `<button onclick="showRite()">☼ The Daily Rite (practice) →</button>`;
    if(examCount)   h += `<button onclick="showExam()">◈ The Grand Examination (${examCount}) →</button>`;
    if(castN)       h += `<button onclick="showRoster()">☙ The players (${castN}) →</button>`;
    if(threadCount) h += `<button onclick="showThreads()">✦ The woven threads (${threadCount}) →</button>`;
    if(missCount)   h += `<button onclick="showReview()">↺ Re-walk the missed omens (${missCount}) →</button>`;
    h += `</div>`;
  }
  ["Iliad","Odyssey"].forEach(short=>{
    const list = PLAN.filter(p=>p.short===short);
    const a = list.filter(p=>authored(p.id)).length;
    h += `<div class="band"><span>${short} · ${a}/24</span><hr></div><div class="grid">`;
    list.forEach(p=>{
      if(authored(p.id)){
        const d = window.LOOM_DATA[p.id]; const best=bestScore(p.id); const read=isRead(p.id);
        const total = d.quiz?d.quiz.length:0;
        const st = best!=null ? `${best}/${total}${read?' · ✓':''}` : (read?'✓ read':'open');
        h += `<div class="cell${read?' read':''}" onclick="showBook('${p.id}')"><div class="bk">Book ${p.n}</div><div class="tt">${d.meta.title}</div><div class="st">${st}</div></div>`;
      } else {
        h += `<div class="cell unwritten"><div class="bk">Book ${p.n}</div><div class="tt">unwritten</div></div>`;
      }
    });
    h += `</div>`;
  });
  document.getElementById('view').innerHTML = h;
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ---- THE DAILY RITE (practice; never spins the thread) ----
   Drawn only from read books: an epithet question can reveal a name as surely as
   a roster card. Deliberately does not write the day log. */
function readBooks(){
  return ORDER.filter(id => authored(id) && isRead(id))
              .map(id => ({ id, data: window.LOOM_DATA[id] }));
}

function showRite(){
  current = null;
  localStorage.removeItem('loom.last');
  document.getElementById('topbar').innerHTML =
    `<div class="grp"><button onclick="showHome()">✦ All Books</button>`+
      `<button onclick="showRoster()">Players</button>`+
      `<button onclick="showThreads()">Threads</button>`+
      `<button onclick="showExam()">Examination</button></div>`+
    `<div class="grp"><button class="active" disabled>The Daily Rite</button></div>`;

  const books = readBooks();
  const draw = window.LOOM_OMENS.dailyRite(books, { n:5, rng:Math.random, label });

  let h = `<div class="crown">◈ The Loom offers practice ◈</div><h1>The Daily Rite</h1>`;
  if(!draw.length){
    h += `<div class="priorscore">Mark a book read and the Loom will draw from it.</div>`;
    h += `<div class="footnav"><button onclick="showHome()">✦ All Books</button></div>`;
    document.getElementById('view').innerHTML = h;
    window.scrollTo({top:0, behavior:'smooth'});
    return;
  }
  h += `<div class="sub">${draw.length} omens · practice only · the thread is not spun here</div>`;
  h += renderThread(draw.length);
  h += `<div class="tally" id="tally">${draw.length} omens to read · none yet turned</div><div id="quiz"></div>`;
  h += `<div class="homeacts"><button onclick="showRite()">Draw again</button></div>`;
  h += `<div class="footnav"><button onclick="showHome()">✦ All Books</button><button onclick="showThreads()">Threads</button><button onclick="showReview()">Review</button></div>`;
  document.getElementById('view').innerHTML = h;

  const quiz = document.getElementById('quiz');
  let answered = 0, missed = 0;
  const finish = right => {
    if(!right){ missed++; frayThread(missed, draw.length); }
    answered++;
    document.getElementById('tally').textContent = `Omens read · ${answered} of ${draw.length}`;
  };

  draw.forEach(item => {
    const card = document.createElement('div'); card.className='q';
    const ki = KIND[item.kind] || KIND.event;
    card.innerHTML = `<div class="qhead"><span class="qkind ${ki.cls}">${ki.label}</span></div>`+
                     `<div class="qt">${item.q}</div>`;
    const truth = document.createElement('div'); truth.className='truth'; truth.innerHTML = item.truth;

    const render = formatOf(item) === 'sequence' ? renderSequence : renderChoice;
    render(card, item, right => { truth.classList.add('show'); finish(right); });
    card.appendChild(truth); quiz.appendChild(card);
  });
  window.scrollTo({top:0, behavior:'smooth'});
}

/* one thread card; `srcId` is the book it lives on */
function threadCard(t, srcId){
  const dir = t.dir==='back' ? '↩ a thread back' : (t.dir==='ahead' ? 'a thread ahead ↪' : '↔ a thread');
  const toAuthored = authored(t.to);
  const btn = toAuthored
    ? `<button class="lk" onclick="showBook('${t.to}')">Read ${label(t.to)} →</button>`
    : `<button class="lk" disabled>${label(t.to)} — unwritten</button>`;
  return `<div class="thread"><div class="dir">${dir}</div>`+
         `<div class="from">on ${label(srcId)} · links to ${label(t.to)}</div>`+
         `<h3 class="tt">${t.title}</h3><p class="nt">${t.note}</p>${btn}</div>`;
}

/* ---- ROSTER (the players the reading has met) ----
   Derived live from LOOM_DATA, exactly like the woven threads: no separate
   character file. A player met in several books is folded into one card that
   carries the trail of books they walk through.
   Only books the reader has finished are gathered: a name the reader has not
   met is itself a spoiler — that Helenus exists, that Dolon matters. Because
   every book here is read, every field on the card is read-gated for free. */
function collectCast(){
  const groups = { "Mortals":[], "Gods & Powers":[] };
  const index = {};   // "Bucket|Name" -> card
  ORDER.filter(id=> authored(id) && isRead(id)).forEach(id=>{
    const d = window.LOOM_DATA[id];
    if(!d.characters) return;
    Object.keys(d.characters).forEach(group=>{
      (d.characters[group]||[]).forEach(c=>{
        const isGod = group.toLowerCase().includes('god') || c.god;
        const bucket = isGod ? "Gods & Powers" : "Mortals";
        const key = bucket + '|' + c.name;
        if(!index[key]){
          index[key] = { name:c.name, epithet:c.epithet||'', god:isGod, books:[], epithets:[], notes:[] };
          groups[bucket].push(index[key]);
        }
        const card = index[key];
        if(card.books.indexOf(id)<0) card.books.push(id);
        if(c.epithet) card.epithet = c.epithet;
        // Keep each read book's note; castCard takes the last, the furthest the
        // reader has come. ORDER runs ascending, so notes[] ends up in book order.
        if(c.role || c.tag) card.notes.push({ book:id, role:c.role||'', tag:c.tag||'' });
        if(c.epithet){                                             // an epithet may shift book to book
          let e = card.epithets.find(x=> x.ep === c.epithet);
          if(!e){ e = { ep:c.epithet, books:[] }; card.epithets.push(e); }
          if(e.books.indexOf(id)<0) e.books.push(id);
        }
      });
    });
  });
  // most-present first, then alphabetical
  Object.keys(groups).forEach(g=> groups[g].sort((a,b)=> b.books.length - a.books.length || a.name.localeCompare(b.name)));
  return groups;
}
const castCount = () => { const g=collectCast(); return g["Mortals"].length + g["Gods & Powers"].length; };
