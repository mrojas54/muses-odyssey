<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Muse's Odyssey</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Muse’s Odyssey">
<meta name="theme-color" content="#7c2331">

<style>
  :root{
    --ink:#2b211a; --soft:#6b5d4f; --parch:#f4ebdc; --parch2:#efe3cf;
    --wine:#7c2331; --gold:#b8862f; --olive:#5d6b3a; --sky:#3f5a6b;
    --ok:#46663d; --ok-bg:#e6efd9; --no:#8a3a3f; --no-bg:#f3dcd9;
    --card:#fffaf0; --line:#e0d2ba;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0; background:radial-gradient(120% 100% at 50% 0%, #f7efe0 0%, #ecdcc2 100%);
    color:var(--ink); font-family:Georgia,'Times New Roman',serif; line-height:1.6; padding:20px 16px 80px;}
  .wrap{max-width:660px; margin:0 auto;}

  /* masthead */
  .masthead{text-align:center; margin:6px 0 18px;}
  .masthead .mark{font-size:15px; letter-spacing:6px; text-transform:uppercase; color:var(--wine);}
  .masthead .mark b{font-weight:normal;}
  .masthead .by{color:var(--soft); font-style:italic; font-size:13px; margin-top:5px; letter-spacing:.5px;}
  .masthead .rule{width:64px; height:1px; background:var(--gold); margin:12px auto 0; opacity:.7;}

  /* persistent nav bar */
  .topbar{display:flex; align-items:center; gap:10px; justify-content:space-between; flex-wrap:wrap;
    margin-bottom:24px; padding-bottom:14px; border-bottom:1px solid var(--line);}
  .topbar:empty{display:none;}
  .topbar .grp{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .topbar button{font:inherit; font-size:13px; background:var(--parch); border:1px solid var(--line);
    color:var(--soft); border-radius:20px; padding:6px 13px; cursor:pointer; transition:.15s;}
  .topbar button:hover:not(:disabled){border-color:var(--gold);}
  .topbar button:disabled{opacity:.35; cursor:default;}
  .topbar button.active{background:var(--olive); color:#fbeede; border-color:var(--olive);}
  .topbar .pos{font-style:italic; color:var(--soft); font-size:14px;}
  .topbar .readtoggle.on{background:var(--olive); color:#fbeede; border-color:var(--olive);}

  /* home — progress + grid */
  .progress{text-align:center; color:var(--soft); font-size:13px; letter-spacing:1px; margin:4px 0 6px;}
  .progbar{height:6px; background:var(--parch2); border-radius:4px; overflow:hidden; margin:8px auto 14px; max-width:360px;}
  .progbar > i{display:block; height:100%; background:var(--gold); transition:width .4s ease;}
  .homeacts{text-align:center; margin:0 0 22px;}
  .homeacts button{font:inherit; font-size:13px; background:var(--parch); border:1px solid var(--line);
    color:var(--wine); border-radius:20px; padding:7px 16px; cursor:pointer; transition:.15s; letter-spacing:.5px;}
  .homeacts button:hover{border-color:var(--gold);}
  .band{display:flex; align-items:center; gap:12px; margin:26px 0 14px;}
  .band hr{flex:1; border:none; border-top:1px solid var(--line);}
  .band span{color:var(--gold); font-size:12px; letter-spacing:3px; text-transform:uppercase; white-space:nowrap;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(96px,1fr)); gap:10px;}
  .cell{border:1px solid var(--line); border-radius:11px; padding:10px 8px; text-align:center; background:var(--card);
    cursor:pointer; transition:.12s; min-height:84px; display:flex; flex-direction:column; justify-content:center; gap:3px;}
  .cell:hover{border-color:var(--gold); transform:translateY(-1px);}
  .cell .bk{font-size:13px; letter-spacing:1px; text-transform:uppercase; color:var(--wine);}
  .cell .tt{font-size:11px; color:var(--soft); line-height:1.25; max-height:2.6em; overflow:hidden;}
  .cell .st{font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--olive);}
  .cell.read{box-shadow:inset 0 0 0 2px #5d6b3a55;}
  .cell.unwritten{background:transparent; border-style:dashed; cursor:default; opacity:.5;}
  .cell.unwritten:hover{transform:none; border-color:var(--line);}
  .cell.unwritten .bk{color:var(--soft);}

  /* book view */
  .crown{text-align:center; color:var(--wine); letter-spacing:3px; font-size:13px; text-transform:uppercase; margin-bottom:6px;}
  h1{text-align:center; font-size:29px; margin:0 0 4px; font-weight:normal;}
  .sub{text-align:center; color:var(--soft); font-style:italic; font-size:15px; margin-bottom:8px;}
  .meta{text-align:center; color:var(--gold); font-size:12px; letter-spacing:2px; text-transform:uppercase; margin-bottom:26px;}
  .scene{background:linear-gradient(160deg, #2a2030 0%, #1f2a33 100%); color:#e9dcc6; border-radius:16px; padding:24px 22px; margin-bottom:30px; font-size:16px;}
  .scene .lbl{color:#d9b366; font-size:12px; letter-spacing:3px; text-transform:uppercase; text-align:center; display:block; margin-bottom:12px;}
  .scene p{margin:0 0 12px;} .scene p:last-child{margin-bottom:0;} .scene i{color:#f0e2c8;}
  .recap{background:var(--parch2); border:1px solid var(--line); border-left:4px solid var(--wine); border-radius:12px; padding:18px 20px; margin-bottom:26px; font-size:15px; font-style:italic; color:var(--soft);}
  .recap .lbl{color:var(--wine); font-size:11px; letter-spacing:3px; text-transform:uppercase; text-align:center; display:block; margin-bottom:10px; font-style:normal;}
  .recap p{margin:0 0 10px;} .recap p:last-child{margin-bottom:0;} .recap b{color:var(--ink); font-style:normal; font-weight:normal;}
  .invoke{background:var(--wine); color:#fbeede; border-radius:16px; padding:22px; margin-bottom:30px; text-align:center; font-style:italic; font-size:17px;}
  .invoke .src{display:block; font-style:normal; font-size:12px; letter-spacing:2px; text-transform:uppercase; color:#e8c79a; margin-top:12px;}
  .movement{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:22px 20px; margin-bottom:18px; box-shadow:0 2px 10px #00000010;}
  .mnum{color:var(--gold); font-size:12px; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px;}
  .mtitle{font-size:21px; margin:0 0 12px; font-weight:normal;}
  .movement p{margin:0 0 12px;} .movement p:last-child{margin-bottom:0;}
  .why{border-left:3px solid var(--gold); background:#fbf4e3; padding:11px 15px; border-radius:0 8px 8px 0; font-size:15px; color:var(--soft); margin-top:4px;}
  .why b{color:var(--ink);}
  .who{color:var(--wine); font-style:italic;} .god{color:var(--sky); font-style:italic;}
  .simile{margin:26px 0; padding:18px 20px; border:1px dashed var(--gold); border-radius:12px; background:#fdf7ea; font-style:italic; color:var(--soft); font-size:15px;}
  .simile .lbl{display:block; font-style:normal; color:var(--gold); font-size:12px; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; text-align:center;}
  .simile p{margin:0 0 9px;} .simile p:last-child{margin-bottom:0;}
  .terms{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px 20px; margin-bottom:18px;}
  .terms .t{margin-bottom:11px;} .terms .t:last-child{margin-bottom:0;}
  .terms .gk{color:var(--wine); font-style:italic; font-weight:bold;} .terms .df{color:var(--soft); font-size:15px;}
  .c{background:var(--card); border:1px solid var(--line); border-radius:13px; padding:15px 18px; margin-bottom:12px; box-shadow:0 2px 9px #00000010;}
  .c .nm{font-size:18px; margin:0;} .c .ep{font-style:italic; font-size:13.5px; margin:1px 0 8px; color:var(--wine);} .c .ep.god{color:var(--sky);}
  .c .rl{margin:0; font-size:15px;}
  .tag{display:inline-block; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--olive); border:1px solid var(--line); border-radius:20px; padding:2px 9px; margin-top:9px;}

  /* threads */
  .thread{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px 20px; margin-bottom:14px; box-shadow:0 2px 9px #00000010;}
  .thread .dir{font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:6px;}
  .thread .tt{font-size:18px; margin:0 0 8px; font-weight:normal;}
  .thread .nt{margin:0 0 13px; font-size:15px; color:var(--soft);}
  .thread .lk{font:inherit; font-size:13px; background:var(--parch); border:1px solid var(--line); color:var(--wine); border-radius:20px; padding:6px 13px; cursor:pointer; transition:.15s;}
  .thread .lk:hover{border-color:var(--gold);}
  .thread .lk:disabled{opacity:.45; cursor:default; color:var(--soft);}
  .thread .from{font-size:12px; color:var(--soft); font-style:italic; margin-bottom:8px;}

  /* quiz */
  .divider{text-align:center; color:var(--gold); letter-spacing:6px; margin:34px 0 26px; font-size:16px;}
  .gate{text-align:center; margin-bottom:8px;}
  .gate h2{font-size:24px; font-weight:normal; margin:0 0 4px;}
  .priorscore{text-align:center; color:var(--soft); font-size:13px; font-style:italic; margin:6px 0 6px;}
  .missnote{text-align:center; color:var(--wine); font-size:13px; font-style:italic; margin:0 0 14px;}
  .tally{text-align:center; color:var(--soft); font-size:13px; letter-spacing:2px; margin:0 0 18px; text-transform:uppercase;}
  .q{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px 18px; margin-bottom:18px; box-shadow:0 2px 10px #00000010;}
  .qhead{display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-bottom:8px;}
  .qn{color:var(--gold); font-size:12px; letter-spacing:2px; text-transform:uppercase;}
  .reviewfrom{font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--soft); margin-bottom:6px;}
  .q.cleared{opacity:.6;}
  #reviewdone{display:none; text-align:center; background:var(--olive); color:#f3f7ea; border-radius:16px; padding:26px 22px; margin-top:8px;}
  #reviewdone.show{display:block; animation:fade .4s ease;}
  #reviewdone .rsum{font-size:18px; font-style:italic; margin:8px 0 4px;}
  #reviewdone button{font:inherit; margin-top:16px; background:#f3f7ea; color:var(--olive); border:none; border-radius:20px; padding:8px 18px; cursor:pointer; letter-spacing:1px;}
  .qkind{display:inline-block; font-size:10px; letter-spacing:1px; text-transform:uppercase; border-radius:20px; padding:2px 9px;}
  .k-event{color:var(--olive); border:1px solid #5d6b3a55; background:#eef2e3;}
  .k-meaning{color:var(--sky); border:1px solid #3f5a6b44; background:#e7eef2;}
  .k-thread{color:var(--wine); border:1px solid #7c233144; background:#f6e6e7;}
  .missflag{font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--gold); border:1px solid var(--gold); border-radius:20px; padding:2px 9px;}
  .qt{font-size:18px; margin-bottom:16px;}
  .opt{display:block; width:100%; text-align:left; font:inherit; font-size:16px; background:var(--parch); border:1px solid var(--line); border-radius:10px; padding:13px 15px; margin-bottom:10px; cursor:pointer; color:var(--ink); transition:transform .08s ease, background .15s ease, border-color .15s ease;}
  .opt:active{transform:scale(.99);} .opt:hover{border-color:var(--gold);}
  .opt.correct{background:var(--ok-bg); border-color:var(--ok); color:var(--ok); font-weight:bold;}
  .opt.wrong{background:var(--no-bg); border-color:var(--no); color:var(--no);}
  .opt:disabled{cursor:default;}
  .truth{display:none; margin-top:4px; padding:13px 15px; border-left:3px solid var(--gold); background:#fbf4e3; border-radius:0 8px 8px 0; font-size:15px; color:var(--soft);}
  .truth b{color:var(--ink);} .truth.show{display:block; animation:fade .3s ease;}
  .examsrc{margin-top:10px; color:var(--gold); font-size:12px; letter-spacing:1px; text-transform:uppercase;}
  @keyframes fade{from{opacity:0; transform:translateY(-3px);} to{opacity:1;}}
  #verdict{display:none; text-align:center; background:var(--wine); color:#fbeede; border-radius:16px; padding:28px 22px; margin-top:8px;}
  #verdict.show{display:block; animation:fade .4s ease;}
  #verdict .score{font-size:46px; letter-spacing:2px; margin:6px 0;}
  #verdict .vline{font-size:19px; font-style:italic; margin-top:10px;}
  #verdict .breakdown{margin-top:16px;}
  #verdict .bk{display:inline-block; margin:3px 5px; padding:4px 12px; border-radius:20px; background:#ffffff1a; border:1px solid #ffffff33; font-size:13px; letter-spacing:.5px;}
  /* per-book reckoning: one row per book, canonical reading order, a bar for the ratio */
  #verdict .books{margin:20px auto 4px; max-width:340px; text-align:left;}
  #verdict .books h4{margin:0 0 10px; font-size:12px; letter-spacing:2px; text-transform:uppercase; color:#e8c79a; text-align:center; font-weight:normal;}
  #verdict .brow{display:flex; align-items:center; gap:10px; margin:6px 0; font-size:13px; letter-spacing:.5px;}
  #verdict .brow .bl{flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:.9;}
  #verdict .brow .bbar{flex:0 0 64px; height:5px; border-radius:3px; background:#ffffff1a; overflow:hidden;}
  #verdict .brow .bbar i{display:block; height:100%; background:#e8c79a;}
  #verdict .brow .bsc{flex:0 0 auto; font-variant-numeric:tabular-nums; opacity:.85;}
  #verdict .brow.weak .bl{color:#e8c79a; opacity:1;}
  #verdict .brow.weak .bbar i{background:#c98b8b;}
  #verdict .small{font-size:13px; opacity:.85; margin-top:16px; letter-spacing:1px;}
  #verdict button{font:inherit; margin-top:16px; background:#fbeede; color:var(--wine); border:none; border-radius:20px; padding:8px 18px; cursor:pointer; letter-spacing:1px;}
  .footnav{display:flex; gap:10px; justify-content:space-between; margin-top:34px; padding-top:18px; border-top:1px solid var(--line);}
  .footnav button{font:inherit; font-size:14px; background:var(--parch); border:1px solid var(--line); color:var(--soft); border-radius:22px; padding:9px 16px; cursor:pointer; transition:.15s;}
  .footnav button:hover:not(:disabled){border-color:var(--gold);} .footnav button:disabled{opacity:.35; cursor:default;}
  .empty{text-align:center; color:var(--soft); font-style:italic; padding:60px 20px;}

  /* P1: tactile press feedback on nav/link/action pills — :hover is invisible on
     touch, so taps gave no cue. Mirrors the quiz options' existing :active state. */
  .topbar button:active:not(:disabled), .homeacts button:active,
  .thread .lk:active:not(:disabled), .footnav button:active:not(:disabled){
    transform:scale(.98); border-color:var(--gold);
  }

  /* --- mobile (phones ≤480px) — everything above stays the desktop layout --- */
  @media (max-width:480px){
    /* P0: the Threads view's long "From … — Title" band labels were white-space:nowrap
       at 394–496px intrinsic width, forcing the whole page to scroll sideways on a
       ~343px phone content box. Let band labels wrap instead (min-content is only a
       short word, so they fit); the short home/section bands are unaffected. */
    .band span{ white-space:normal; }
    /* P1: nav/link/action pills were ~35px tall — under the 44px touch-target min. */
    .topbar button, .homeacts button, .thread .lk, .footnav button{ min-height:44px; }
    /* P1: wrapped topbar rows align left instead of spreading with ragged gaps. */
    .topbar{ justify-content:flex-start; }
    /* P1: lift the two 10px labels to 11px — the smallest text in the app. */
    .cell .st, .qkind{ font-size:11px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <div class="mark">✦ The Muse's <b>Odyssey</b> ✦</div>
    <div class="by">a reading companion for the Iliad &amp; the Odyssey</div>
    <div class="rule"></div>
  </div>
  <div class="topbar" id="topbar"></div>
  <div id="view"></div>
</div>

<script>
(function(){
  var ok=false;
  try{ var k='__loom_probe'; window.localStorage.setItem(k,'1'); window.localStorage.removeItem(k); ok=true; }
  catch(e){ ok=false; }
  if(!ok){
    var mem=Object.create(null);
    var shim={
      getItem:function(k){ k=String(k); return k in mem?mem[k]:null; },
      setItem:function(k,v){ mem[String(k)]=String(v); },
      removeItem:function(k){ delete mem[String(k)]; },
      clear:function(){ mem=Object.create(null); },
      key:function(i){ return Object.keys(mem)[i]||null; },
      get length(){ return Object.keys(mem).length; }
    };
    try{ Object.defineProperty(window,'localStorage',{configurable:true,writable:true,value:shim}); }
    catch(e){ try{ window.localStorage=shim; }catch(e2){} }
  }
  window.addEventListener('error',function(ev){
    var view=document.getElementById('view');
    if(view && view.innerHTML.trim()===''){
      view.innerHTML='<div style="padding:28px 22px;color:#8a3a3f;font:15px Georgia,serif;line-height:1.5;">'+
        '<b>The loom snagged.</b><br><br>'+
        String((ev && (ev.message||ev.error))||'unknown error')+
        '<br><br><span style="color:#6b5d4f;font-size:13px;">(shown so the page is not silently blank)</span></div>';
    }
  });
})();
</script>

<script>
window.LOOM_DATA = window.LOOM_DATA || {};
window.LOOM_DATA["iliad-01"] = {
  meta: {
    id: "iliad-01",
    epic: "The Iliad",
    song: "First Song",
    book: 1,
    title: "The Wrath of Achilles",
    subtitle: "Book One — where the whole epic is wound: a plague, a stolen prize, and a nod that cannot be revoked",
    tagline: "Scene · nine movements · the roster · then the Ninth Hour",
    epigraph: {
      text: "\"Rage—Goddess, sing the rage of Peleus' son Achilles, murderous, doomed, that cost the Achaeans countless losses…\"",
      src: "Fagles, Iliad 1.1–2 — the poem's very first word is rage (mēnis)"
    }
  },

  recap: [
    "Before the song begins: a golden apple thrown <b>for the fairest</b>, and three goddesses for the Trojan prince <b>Paris</b> to judge. He chose <b>Aphrodite</b>, and his reward was <b>Helen</b> — loveliest of mortal women, and already the wife of <b>Menelaus</b> of Sparta.",
    "Paris carried her across the sea to Troy. So the kings of Greece, oath-bound to defend that marriage, launched a thousand ships behind <b>Agamemnon</b> — Menelaus' brother and high king. Nine years they have besieged Troy's walls and cannot break them. The tenth year opens here."
  ],

  scene: [
    "The Greek host has camped nine years on the windy plain before Troy, ships beached at their backs, the city's walls still unbroken. The war has settled into a grinding routine of raids and plunder — and the plunder is where this story starts.",
    "Two captive women, taken in those raids, become the hinge of everything: <i>Chryseis</i>, awarded to <span class='who'>Agamemnon</span> the high king, and <i>Briseis</i>, awarded to <span class='who'>Achilles</span> the greatest fighter. The poem opens not on a battlefield but on a quarrel between the two most powerful Greeks over honor — and the god who makes them pay for it."
  ],

  terms: [
    { gk: "mēnis (μῆνις)", def: "rage, wrath — and not ordinary anger but the towering, ruinous kind reserved elsewhere for gods. It is the <b>first word of the poem</b>; the whole Iliad is the story of one man's mēnis and its cost. (Note: the title <i>Iliad</i> means \"poem of Ilios/Troy\" — it does <i>not</i> mean \"wound.\")" },
    { gk: "geras (γέρας)", def: "a prize of honor — the cut of plunder a hero is publicly awarded. Briseis and Chryseis are gera. To take a man's geras is not theft of property but a public stripping of worth." },
    { gk: "timē (τιμή)", def: "honor, public standing — the thing a geras measures. The quarrel is fought over timē, not love: Agamemnon's seizure of Briseis is an assault on Achilles' rank before the whole army." }
  ],

  movements: [
    {
      n: "Movement I",
      title: "The priest comes with ransom",
      what: "<p><span class='who'>Chryses</span>, a priest of <span class='god'>Apollo</span>, arrives at the Greek camp bearing gold to buy back his captured daughter <span class='who'>Chryseis</span>. The army wants to honor him — but <span class='who'>Agamemnon</span>, the high king, drives the old man off with threats.</p>",
      why: "The first act of the epic is a king dishonoring a suppliant and a priest. Pride placed above reverence — the exact pattern that will repeat, at far greater cost, against Achilles."
    },
    {
      n: "Movement II",
      title: "Apollo's plague",
      what: "<p>Chryses prays to his god. Apollo comes down <i>like nightfall</i> and for nine days his arrows fall on the camp — first the mules and dogs, then the men. The pyres of the dead burn without pause.</p>",
      why: "A private insult becomes a public catastrophe. In Homer's world a slight to one priest can bleed an entire army — the human and the divine are never separate, and a god's anger is felt as plague, weather, and death."
    },
    {
      n: "Movement III",
      title: "The seer's dangerous truth",
      what: "<p>On the tenth day <span class='who'>Achilles</span> calls an assembly. The seer <span class='who'>Calchas</span> will only name the cause if Achilles shields him — because the truth blames the king: Chryseis must be returned, unransomed, with sacrifice.</p>",
      why: "Calchas's fear measures how dangerous truth is near power. Achilles, by guaranteeing his safety, sets himself against Agamemnon before a single word of the quarrel is spoken."
    },
    {
      n: "Movement IV",
      title: "The quarrel",
      what: "<p>Agamemnon agrees to obey the god — but demands another prize to replace his loss. Achilles calls him greedy; Agamemnon, enraged, swears to take <span class='who'>Briseis</span>, the woman allotted to Achilles, to put the younger man in his place.</p>",
      why: "Briseis is a token of <i>honor</i> (timē), not a love. To seize her publicly is to strip Achilles' worth before the whole army. This is the wound the poem opens on: the insult to a soldier's honor is the rage (mēnis) that begins, and drives, the entire story."
    },
    {

    "The war the gods reopened runs hot. A sworn duel for <b>Helen</b> dissolved when <b>Aphrodite</b> spirited <b>Paris</b> away, and then <b>Pandarus</b>' treacherous arrow broke the truce that should have ended it all — first blood on the plain.",

  movements: [
    {
      n: "Movement I",
      title: "No mercy for Adrestus",
      what: "<p>With the Trojans in retreat, <span class='who'>Menelaus</span> takes Adrestus alive; the man clasps his knees and begs — his father will pay a rich ransom. Menelaus is moved and nearly yields. Then <span class='who'>Agamemnon</span> rushes up: <i>let none escape sheer death — not even the boy still in his mother's womb.</i> Menelaus shoves the suppliant away, Agamemnon spears him in the flank, and sets his heel on the corpse to wrench the shaft free.</p>",
      why: "The book opens on the war at its coldest, so that everything tender to come is measured against it. Agamemnon's total-war creed — kill the unborn — is the plain's logic in its purest, ugliest form. Homer wants that logic fresh in your mind when, a few movements later, two enemies choose <i>not</i> to kill, and a father cradles a son. This is the darkness the rest of the book pushes back against."
    },

      why: "The errand is what pulls Hector off the battlefield and into the heart of the book — the whole domestic movement hangs on it. And notice its cause: the Greeks so fear Diomedes after Book 5 that Troy's only hope seems to be prayer. The aristeia we just watched is now a shadow over the city, driving its women to their knees before an altar."
    },
    {
      n: "Movement III",
      title: "Glaucus and Diomedes — leaves, and an old debt",

      why: "A small scene doing quiet work. Hector will not be softened, not by wine, not by rest, not by his mother's care — he holds himself apart from every comfort the city offers because he cannot afford it. The unwashed, bloody hands are the mark of the man the war has made: he no longer fully belongs to the peaceful house he is standing in. Every reunion in this book is also a small leave-taking."

  movements: [
    {
      n: "Movement I",
      title: "The gods call a pause",
      what: "<p>As the slaughter reopens, <span class='god'>Athena</span> darts down from Olympus to help the Greeks; <span class='god'>Apollo</span> comes to meet her from Troy's citadel. Rather than tear the day apart between them, they agree to still the general fighting and rouse <span class='who'>Hector</span> to challenge the Achaeans' best to single combat. The seer <span class='who'>Helenus</span>, reading the gods' will in his heart, tells Hector to step forward — and reassures him: it is not his fated day to die.</p>",
      why: "Homer resets the board. After the god-drenched chaos of Book 5 and the human intimacy of Book 6, he narrows the whole war to two men in a ring of watchers. And notice who arranges it: the gods, bored or weary of mass death, stage a duel for their own reasons. Even the noblest human contest in the book is, from above, a spectacle the gods set up — and Helenus's promise that Hector won't die today quietly tells us the duel is safe theater before it begins."

      why: "The silence is the point. Hector has just come from the gates a resolved and terrible man, and no Greek wants him. Menelaus's rash volunteering — the wronged husband, the whole war's supposed cause — would be suicide, and Agamemnon's restraining hand shows how much the Greeks have shrunk in Achilles' absence. The army that once fielded an unstoppable Diomedes now needs shaming into producing a single champion."
    },
    {
      n: "Movement III",
      title: "Nestor shames them into nine",
      what: "<p>Old <span class='who'>Nestor</span> rises, appalled — how <span class='who'>Peleus</span> would grieve to see the best of the Achaeans cowering before Hector! He spins a tale of his own youth, when he once killed the giant Ereuthalion that no one else would face. The rebuke lands: <b>nine</b> champions leap up at once — <span class='who'>Agamemnon</span>, <span class='who'>Diomedes</span>, both men named <span class='who'>Ajax</span>, <span class='who'>Idomeneus</span>, <span class='who'>Meriones</span>, <span class='who'>Eurypylus</span>, <span class='who'>Thoas</span>, and <span class='who'>Odysseus</span>. Now there are too many, and the choice must be given to the lot.</p>",
      why: "Nestor's whole function in the poem is to convert the memory of a greater age into pressure on the present one. Shame does what courage alone could not — it produces nine volunteers where a moment ago there were none. And the mention of Peleus is a small knife: everyone is thinking of Peleus's son, sitting by his ships, the man who should be answering this challenge and is not."
    },
    {
      n: "Movement IV",
      title: "The lot leaps out for Ajax",
      what: "<p>Each of the nine scratches his mark on a token and drops it into <span class='who'>Agamemnon</span>'s helmet. The armies pray to <span class='god'>Zeus</span> — <i>let it fall to Ajax, or Diomedes, or the king himself.</i> The herald shakes the helmet; one lot springs out, and it is the token of the greater <span class='who'>Ajax</span>, son of Telamon. He is glad; he bids the herald bring it round so all can see his mark, and he arms, grinning grimly, advancing <i>huge, a bulwark of the Achaeans, with a smile on his terrible face and his stride eating the ground.</i> The Trojans' knees go loose to look at him; even Hector's heart pounds.</p>",
      why: "The gods, through the lot, hand the Greeks their best possible defender: not the brilliant Diomedes nor a king, but Ajax — the wall of a man, all endurance and mass. It is a beautifully fitting choice for a duel that will end not in death but in stalemate. Homer even lets Hector feel fear, restoring some balance after Book 6 made us love Hector; now we are reminded he is mortal, and there are men on the plain who can match him."
    },
    {
      n: "Movement V",
      title: "The duel — and the dark falls",
      what: "<p>They close. Spears are hurled and bite shield-bronze; <span class='who'>Ajax</span>'s tower-shield turns Hector's cast, and his own drives through Hector's shield and grazes his neck. They snatch up boulders — Hector's cracks against the great shield's boss; Ajax heaves a millstone of a rock that smashes Hector's shield inward and knocks him flat, and <span class='god'>Apollo</span> hauls him back to his feet. They draw swords for the kill — and the heralds step in: <span class='who'>Idaeus</span> of Troy and <span class='who'>Talthybius</span> of the Greeks hold their staves between the men. <i>Night is coming; it is good to yield to night.</i> Hector agrees, and proposes they part with gifts, so men will always say these two fought and yet honored each other. He gives Ajax a silver-studded sword with its scabbard and baldric; Ajax gives Hector a war-belt bright with purple.</p>",

    },
    {

      title: "Nestor's counsel — burn the dead, build the wall",
      what: "<p>The Greeks feast Ajax in triumph, and <span class='who'>Nestor</span> rises with a plan for the morning: call a truce to gather and burn their dead, raise a single great mound over the ashes, and against it throw up a <b>wall with towers and gates</b>, and dig a deep trench outside it, set with stakes — a fortress for the ships and men. They set to it at dawn.</p>",

    },
    {
      n: "Movement VII",
      title: "Troy debates giving Helen back",
      what: "<p>Inside the city the Trojans hold their own grim assembly. Wise <span class='who'>Antenor</span> stands and says the unsayable: <i>give Helen and all her treasures back</i> — we fight now as men who have broken sworn oaths, and no good will come of it. <span class='who'>Paris</span> refuses flatly: Helen he will never surrender. But he offers to return all the treasure he carried off from Argos, and to add more of his own from Troy. <span class='who'>Priam</span> sends the herald <span class='who'>Idaeus</span> to carry the offer to the Greeks at first light, along with a request for a truce to burn the dead.</p>",
      why: "Here is the whole war laid bare as a moral problem the Trojans themselves can see. Antenor names it exactly: they are defending a broken oath, and the older, wiser voices in Troy know it. But Paris — the man whose appetite began everything — will give back the gold and keep the woman, which is to give back nothing that matters. The war continues not because Troy can't end it but because Paris won't."

  movements: [
    {
      n: "Movement I",
      title: "The ban, and the golden cord",
      what: "<p>At dawn <span class='god'>Zeus</span> gathers the gods and forbids them all to touch the war — <i>whoever I catch helping either side comes back to Olympus lightning-struck, or I fling him down to Tartarus.</i> To silence any thought of resistance he lays out the golden cord: let every god and goddess grip it and pull, and they could not drag him down; but let him choose to pull, and he would haul the lot of them up with the earth and sea besides. The gods sit stunned. Only <span class='god'>Athena</span> ventures a word — they will keep clear of the fighting, but may they at least <i>advise</i> the Greeks? Zeus softens, half-smiling, and lets it stand. Then he drives to Ida to watch.</p>",

    },
    {
      n: "Movement V",
      title: "Teucer behind the shield",
      what: "<p>Rallied, the archer <span class='who'>Teucer</span> — <span class='who'>Ajax</span>'s half-brother — fights from behind that great tower-shield like a child behind its mother: he steps out, looses an arrow into the Trojan press, drops a man, and ducks back under the bronze. He cuts down eight fighters in a row. Again and again he aims at <span class='who'>Hector</span> and misses him — killing Hector's driver Archeptolemus instead, and the young Gorgythion, whose head <i>droops like a garden poppy heavy with seed and the rains of spring.</i> Enraged, Hector snatches up a jagged stone and smashes it into Teucer's collarbone, breaking the bowstring-arm; Ajax covers his fallen brother with the shield.</p>",
      why: "The finest fighting the Greeks manage all day, and Homer frames it as ingenious desperation — a duck-and-shoot from behind another man's shield, not open heroism. Twice Teucer nearly ends the book by killing Hector, and twice the arrow swerves, because Zeus's <i>kŷdos</i> is on Hector today and cannot be shot away. The poppy simile for Gorgythion — a boy's death rendered as a flower bowing under rain — is one of the tenderest images in the poem, dropped into the middle of a rout."

  movements: [
    {
      n: "Movement I",
      title: "Agamemnon breaks — 'let us sail home'",
      what: "<p>Panic runs through the Greek camp like two winds churning the sea. <span class='who'>Agamemnon</span> calls the men together and, weeping, tells them what he told them once before as a trick — but now he means it: <span class='god'>Zeus</span> has betrayed us, our cause is lost, <i>let us cut and run for home.</i> This time it is no test; the king has genuinely broken.</p>",
      why: "Homer deliberately echoes Book 2, where Agamemnon proposed flight as a ruse to test the army's spirit. The repetition is the point: what was a piece of theater then is the real collapse now. The proud king who seized Briseis to prove he could is reduced, one hard day later, to advising surrender through his tears. The wheel has come all the way round on his Book 1 arrogance."

    {
      n: "Movement II",
      title: "Diomedes and Nestor answer",
      what: "<p><span class='who'>Diomedes</span> stands up and rebukes the king to his face: sail if you must — the ships are there, the sea road open — but I and <span class='who'>Sthenelus</span> will fight on until we take Troy, for we came here with a god. The army roars. Then old <span class='who'>Nestor</span>, tactful where Diomedes was blunt, steadies things: post guards at the trench, feast the elders, and take counsel. And at the meal he says the buried thing plainly — <i>you dishonored Achilles, king; you tore his prize away against all our will. Let us think how to win him back with soft words and gifts.</i></p>",
      why: "The younger hero supplies the courage, the old man supplies the diagnosis. Nestor does in the open what no one has dared: he tells Agamemnon that the disaster has a name and the name is his own mistake. This is the moment the poem turns from suffering the wrath to trying to undo it — and it forces the proud king to face, in front of the elders, that the way out runs through the man he wronged."

    {
      n: "Movement III",
      title: "The king confesses, and heaps up the gifts",
      what: "<p><span class='who'>Agamemnon</span> does not fight it. <i>I was blind — atē took me — I will not deny it,</i> he says, and lays out amends beyond counting: seven tripods, ten bars of gold, twenty cauldrons, twelve prize horses, seven skilled women of Lesbos, and <span class='who'>Briseis</span> herself given back, with a solemn oath he never once touched her. And more to come: when Troy falls, a ship heaped with gold and bronze and twenty Trojan women; and back in Greece, one of his three daughters in marriage with no bride-price, and seven rich citadels to rule. <i>All this</i> — if Achilles will yield. But he ends with the sting: <b>let him submit to me, for I am the greater king and the elder.</b></p>",
      why: "The catalogue is staggering on purpose — Agamemnon truly believes any man has a price, and he has named a king's ransom. But listen to the last line, and you hear why the embassy is doomed before it leaves: even in apology, Agamemnon demands submission and pulls rank. He will give Achilles the world so long as Achilles bows. The offer is enormous and the spirit inside it is exactly the spirit that caused the quarrel — and Achilles will hear that spirit under every gift."
    },
    {

      title: "The envoys walk the shore",
      what: "<p><span class='who'>Nestor</span> chooses the embassy: old <span class='who'>Phoenix</span>, who raised Achilles from a boy, to lead; the huge, plain-spoken <span class='who'>Ajax</span>; and shrewd <span class='who'>Odysseus</span>; with two heralds. They go down along the breaking surf, praying to <span class='god'>Poseidon</span> that they might soften the great man's heart, and come at last to the huts and ships of the Myrmidons.</p>",
      why: "The three envoys are chosen to work on Achilles from three angles — the father-figure's love, the friend's blunt honesty, the diplomat's persuasion — and the book will let each try in turn. That Nestor sends Phoenix, Achilles' own foster-father, shows how far past ordinary embassy this is: they are not sending negotiators so much as sending family. The quiet walk by the sea, praying, gives the scene its hush before the great confrontation."
    },
    {
      n: "Movement V",
      title: "Achilles at the lyre",
      what: "<p>They find him not brooding but <b>singing</b> — <span class='who'>Achilles</span> is playing a clear-toned lyre he took as spoil, and singing the <i>klea andrōn</i>, the famous deeds of heroes, with <span class='who'>Patroclus</span> sitting alone across from him, waiting for the song to end. Seeing the envoys, Achilles springs up astonished, still holding the lyre, and welcomes them warmly: <i>you are my dearest friends</i> — he seats them, mixes strong wine, has meat roasted, and plays the perfect host.</p>",
      why: "One of the most quietly astonishing images in the poem: the greatest killer of the age, withdrawn from the war, passing the time by singing the very kind of song the <i>Iliad</i> itself is — the glory of heroes. Homer lets his hero become, for a moment, a poet of the tradition he belongs to. And the warmth of the welcome matters: whatever Achilles is about to refuse, he does not refuse it out of hatred for these men. His <i>xenia</i> is flawless; his quarrel is with the offer and the man behind it."
    },
    {
      n: "Movement VI",
      title: "Odysseus lays out the offer",
      what: "<p><span class='who'>Odysseus</span> speaks first, and speaks well: the Trojans are camped at the ships, <span class='who'>Hector</span> raging, threatening to burn the fleet at dawn — rise and save the Achaeans before it is too late. Then he recites <span class='who'>Agamemnon</span>'s gifts in full, the whole shining catalogue. And he closes with the shrewdest stroke: remember your father <span class='who'>Peleus</span>'s parting words — master your proud heart, for gentleness is the better way. Even if you cannot forgive the king, <i>pity the rest of the Achaeans, who will honor you like a god.</i></p>",
      why: "Odysseus is careful and clever — and notably, when he repeats the gift-list, he quietly drops Agamemnon's insulting demand that Achilles submit. He knows that line would sink the whole embassy, so he edits it out. But Achilles is not a man to be managed, and the very smoothness of the pitch is part of what he will reject. The appeal to Peleus is the strongest card: it is one thing to defy Agamemnon, another to defy your own father's counsel."

    {
      n: "Movement VII",
      title: "The great refusal, and the two fates",
      what: "<p><span class='who'>Achilles</span> answers from the depths, and it is the longest, fiercest speech he has yet made. <i>I hate that man like the gates of Death who hides one thing in his heart and says another.</i> What did all his fighting ever buy him? The coward and the hero come to the same end; he sacked twelve cities and handed the plunder to Agamemnon, who took his one prize like a man robbing a helpless woman. No gifts will move him — <i>not all the wealth of Troy, not all the treasure behind Apollo's stone threshold at Delphi, is worth my life.</i> Cattle and tripods you can raid and win again; <b>a man's life cannot be raided back once it has passed the barrier of his teeth.</b> Then he reveals what his mother told him — the two fates: stay and fall at Troy, and his glory is undying; sail home, and he loses the glory but lives long. And he says it plainly: <i>I choose to live.</i> Let the others find another way; he sails at dawn.</p>",
      why: "The moral summit of the poem. Achilles does what no other Homeric hero does: he holds the whole heroic bargain up to the light and, for one long speech, rejects it — because he has learned that honor from Agamemnon is worthless, and a corpse wins no glory it can enjoy. The line about the barrier of the teeth is the truest thing anyone says in the <i>Iliad</i>: everything else can be won back; a life cannot. That he chooses <i>nostos</i> over <i>kleos</i> here makes his eventual choice of glory, when it comes, a thing freely and terribly taken, not merely fated."

    {

      title: "Phoenix — the Prayers and Meleager",
      what: "<p>Old <span class='who'>Phoenix</span> weeps and pleads, afraid to be left behind. He tells his own story — how he fled his father's house and <span class='who'>Peleus</span> took him in and gave him the infant Achilles to raise: <i>I made you what you are, dear child, and loved you as my own.</i> Then two teaching-tales. First the <b>Prayers</b>: the limping daughters of Zeus who follow after Ruin — honor them and they heal you; spurn them and they beg Zeus to make Ruin hound you instead. Second the warning of <span class='who'>Meleager</span>, who once withdrew from battle in anger and refused every gift and every plea while his city burned, until the enemy was at his own door and his wife begged him — and he fought then and saved them, <i>but too late to be given the gifts.</i> Yield now, Phoenix urges, while the gifts still stand.</p>",
      why: "Phoenix moves from the offer to the soul: not <i>take the treasure</i> but <i>do not let your anger ruin you.</i> The Prayers make forgiveness itself sacred — to refuse the reconciling gifts is to insult Zeus's own daughters. And Meleager is a mirror held up to Achilles: a man who nursed his wrath too long and ended up fighting anyway, having lost both the gifts and the honor by waiting. It is a prophecy disguised as a story, and Achilles half-hears it — he tells Phoenix to stay the night, but will not bend on Agamemnon."
    },
    {
      n: "Movement IX",
      title: "Ajax cuts to the bone",
      what: "<p>Last, blunt <span class='who'>Ajax</span> turns — not even to Achilles, but to Odysseus, as if to say <i>we're wasting our breath, let's go.</i> Yet his few plain words land hardest. A man takes blood-price even for a murdered brother or a dead son, he says, and the killer stays in the land; and here you rage on and on <i>over a single girl</i> — while we, your closest friends of all the army, stand in your own hut begging you. Respect that. Achilles admits Ajax has spoken almost from his own heart — but his rage still chokes him when he remembers being treated like dirt before the whole army. His one concession: he will not lift a hand <i>until</i> Hector's killing reaches the Myrmidons' own ships and huts. There, at his own hull, he will stop him.</p>",
      why: "The diplomat failed and the father half-failed; it is the blunt friend who reaches him, because Ajax appeals not to gifts or gods but to the bond among comrades — <i>we are your dearest, and you are shaming us.</i> Achilles' answer is the crack in the door the rest of the poem will pour through: he ties his return to a condition, <i>when the fighting reaches my ships.</i> He thinks he is naming an unlikely limit. He is really loading a gun and setting it on the table."

    {
      n: "I · The sleepless camp",
      kind: "event",
      q: "How does the night raid come to be proposed?",
      opts: [
        "Achilles suggests it before sailing home",
        "Agamemnon and the captains, unable to sleep after the rout, gather in the dark, and Nestor proposes sending a spy into the Trojan camp",
        "The gods command it in a dream",
        "Hector challenges the Greeks to a night duel"
      ],
      correct: 1,
      truth: "<b>Fear-work, done at night.</b> Agamemnon lies awake watching the Trojan fires; the captains huddle in the ditch; Nestor asks for a man daring enough to slip into the enemy camp and learn their plans. It is the human aftertaste of Book 8's rout — the war has gotten inside them, and nobody can sleep."
    },
    {
      n: "II · Force and guile paired",
      kind: "event",
      q: "Who goes on the raid, and why that pair?",
      opts: [
        "Ajax and Teucer, the shield and the bow",
        "Diomedes volunteers and chooses Odysseus — the finest fighting hand joined to the finest mind, force and cunning together",
        "Agamemnon and Menelaus, the two brothers",
        "Nestor and Idomeneus, the two elders"
      ],
      correct: 1,
      truth: "<b>The book's engine.</b> Diomedes wants a companion — two see what one misses — and picks Odysseus, whose daring and cunning Athena loves. It is the opposite of the solo daylight aristeia: this job needs teamwork, silence, and nerve, and Homer yokes the strongest arm to the shrewdest head to get it."
    },
    {
      n: "III · Dolon's bargain",
      kind: "event",
      q: "Hector sends his own scout, Dolon, toward the ships. What does Dolon demand as his reward?",
      opts: [
        "Helen's hand in marriage",
        "The immortal horses and chariot of Achilles",
        "Command of the Trojan army",
        "A share of Troy's treasury"
      ],
      correct: 1,
      truth: "<b>A fatal over-reach.</b> Vain, greedy Dolon makes Hector swear him the finest team in the Achaean camp — the immortal horses of Achilles, which no living hand but Achilles' can drive. Homer lets the irony sit: the prize is the absent hero's, promised by a Trojan who won't survive the night, on the very night of Achilles' great refusal."
    },
    {
      n: "IV · The scout undone",
      kind: "event",
      q: "The raiders catch Dolon. What happens?",
      opts: [
        "They take him prisoner and he later escapes",
        "Odysseus opens him with cold reassurance; Dolon betrays the Thracians' arrival, then is beheaded by Diomedes mid-plea",
        "Dolon fights them off and flees",
        "They let him go in exchange for a ransom"
      ],
      correct: 1,
      truth: "<b>The anti-duel — victory by ambush and a lie.</b> Odysseus questions him with warm, false calm, and the terrified scout betrays his whole side, including the newly-arrived Thracian king Rhesus. Then Diomedes cuts his neck mid-supplication, the head rolling in the dust. In the dark, the daylight courtesies of ransom and mercy do not apply."
    },
    {
      n: "V · The night's harvest",
      kind: "event",
      q: "Acting on Dolon's information, what do Diomedes and Odysseus do next?",
      opts: [
        "Burn the Trojan ships",
        "Kill the sleeping king Rhesus and twelve Thracians and steal his snow-white horses",
        "Capture Hector in his tent",
        "Set fire to the Trojan camp and retreat"
      ],
      correct: 1,
      truth: "<b>Triumph and butchery at once.</b> Diomedes kills Rhesus and twelve of his men in their sleep while Odysseus drags the bodies clear so the horses won't shy; they lead the famous white team back to the ships. A real Greek victory — and the furthest thing from the honor-duel of Book 7. Homer lets both be true."
    },
    {
      n: "VI · The horses of Book 9",
      kind: "thread",
      q: "How does Book 10 quietly echo Achilles' great refusal in Book 9?",
      opts: [
        "Achilles secretly joins the raid",
        "Hector dangles Achilles' immortal horses as Dolon's reward — the prize of the very man who just refused to fight, that no one else can drive",
        "Agamemnon offers Achilles new gifts at midnight",
        "The embassy tries again and succeeds"
      ],
      correct: 1,
      truth: "<b>The prize no one but the absent man can claim.</b> On the same night Achilles refuses every gift to save the Greeks, the enemy dangles his divine horses to buy a spy. The team hangs over both books as the thing everyone covets and only its missing master can command — a cold little rhyme between the refusal and the raid."
    }
  ]
};
</script>
<script>
/* ---- data registry ---- */
window.LOOM_DATA = window.LOOM_DATA || {};
const LOAD = window.LOOM_BOOKS || [];          // authored ids to actually load (avoids 404s)

/* ---- canonical 48-book plan (the home grid) ---- */
const pad = n => String(n).padStart(2,'0');
const PLAN = [];
for(let i=1;i<=24;i++) PLAN.push({ id:`iliad-${pad(i)}`,   epic:"The Iliad",   short:"Iliad",   n:i });
for(let i=1;i<=24;i++) PLAN.push({ id:`odyssey-${pad(i)}`, epic:"The Odyssey", short:"Odyssey", n:i });
const ORDER = PLAN.map(p => p.id);

/* quiz kinds — the two comprehension layers, plus the cross-book thread */
const KIND = {
  event:   { label:"Event recall",  cls:"k-event"   },
  meaning: { label:"Why it matters", cls:"k-meaning" },
  thread:  { label:"Cross-book thread", cls:"k-thread" }
};

let current=null;
const authored = id => !!window.LOOM_DATA[id];
const isRead = id => localStorage.getItem('loom.read.'+id)==='1';
const setRead = (id,v) => localStorage.setItem('loom.read.'+id, v?'1':'0');
const bestScore = id => { const v=localStorage.getItem('loom.best.'+id); return v==null?null:+v; };
const saveScore = (id,s) => { const b=bestScore(id); if(b==null||s>b) localStorage.setItem('loom.best.'+id, s); };
const priorMiss = id => { try{ return JSON.parse(localStorage.getItem('loom.miss.'+id)||'[]'); }catch(e){ return []; } };
const saveMiss = (id,arr) => localStorage.setItem('loom.miss.'+id, JSON.stringify(arr));

/* ---- authored progress seed ----
   No cross-device sync (that work is deferred — see
   docs/superpowers/plans/2026-07-06-future-user-auth-fastapi.md). Instead we bake
   baseline progress into the app so books already read + quizzed show as done on
   every device. Each key is written ONLY if unset, so a real score you earn later
   is never overwritten, and books added here later still seed on their next load.
   Maintain by hand, deep-dive style: finish a book, add `id: <omen count>` below
   and redeploy. Score = the book's omen count (a perfect sitting). */
(function seedProgress(){
  const SEED = { 'iliad-01':6, 'iliad-02':6, 'iliad-03':6, 'iliad-04':6 };   // id → best score (= perfect)
  try {
    for(const id in SEED){
      if(localStorage.getItem('loom.read.'+id)==null) localStorage.setItem('loom.read.'+id,'1');
      if(localStorage.getItem('loom.best.'+id)==null) localStorage.setItem('loom.best.'+id, String(SEED[id]));
    }
  } catch(e){ /* locked-down origin (raw file://): harness shim covers the bundle */ }
})();
const clearMiss = (id,qi) => saveMiss(id, priorMiss(id).filter(x=>x!==qi));
function allMisses(){
  const out=[];
  ORDER.filter(authored).forEach(id=>{
    const d=window.LOOM_DATA[id];
    priorMiss(id).forEach(qi=>{ if(d.quiz && d.quiz[qi]) out.push({id, qi, item:d.quiz[qi]}); });
  });
  return out;
}
const planOf = id => PLAN.find(p=>p.id===id);
const label = id => { const p=planOf(id); return p ? `${p.short} · Book ${p.n}` : id; };

function boot(){
  const last = localStorage.getItem('loom.last');
  if(last && authored(last)) showBook(last); else showHome();
}

/* ---- HOME ---- */
function showHome(){
  current=null;
  localStorage.removeItem('loom.last');
  document.getElementById('topbar').innerHTML='';
  const authoredAll = PLAN.filter(p=>authored(p.id)).length;
  const readAll = PLAN.filter(p=>isRead(p.id)).length;
  const threadCount = ORDER.filter(authored).reduce((s,id)=> s + ((window.LOOM_DATA[id].threads||[]).length), 0);
  const examCount = ORDER.filter(authored).reduce((s,id)=> s + ((window.LOOM_DATA[id].quiz||[]).length), 0);
  let h='';
  const missCount = allMisses().length;
  h += `<div class="progress">${authoredAll} of 48 books on the loom · ${readAll} read</div>`;
  h += `<div class="progbar"><i style="width:${(authoredAll/48*100).toFixed(1)}%"></i></div>`;
  if(examCount || threadCount || missCount){
    h += `<div class="homeacts">`;
    if(examCount)   h += `<button onclick="showExam()">◈ The Grand Examination (${examCount}) →</button>`;
    if(threadCount) h += `<button onclick="showThreads()">✦ The woven threads (${threadCount}) →</button>`;
    if(missCount)   h += `<button onclick="showReview()">↺ Re-walk the missed omens (${missCount}) →</button>`;
    h += `</div>`;
  }
  ["Iliad","Odyssey"].forEach(short=>{
    const list = PLAN.filter(p=>p.short===short);
    const a = list.filter(p=>authored(p.id)).length;
    h += `<div class="band"><span>${short} · ${a}/24</span><hr></div><div class="grid">`;
    list.forEach(p=>{
      if(authored(p.id)){
        const d = window.LOOM_DATA[p.id]; const best=bestScore(p.id); const read=isRead(p.id);
        const total = d.quiz?d.quiz.length:0;
        const st = best!=null ? `${best}/${total}${read?' · ✓':''}` : (read?'✓ read':'open');
        h += `<div class="cell${read?' read':''}" onclick="showBook('${p.id}')"><div class="bk">Book ${p.n}</div><div class="tt">${d.meta.title}</div><div class="st">${st}</div></div>`;
      } else {
        h += `<div class="cell unwritten"><div class="bk">Book ${p.n}</div><div class="tt">unwritten</div></div>`;
      }
    });
    h += `</div>`;
  });
  document.getElementById('view').innerHTML = h;
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ---- THREADS (cross-book view) ---- */
function showThreads(){
  current=null;
  localStorage.removeItem('loom.last');
  document.getElementById('topbar').innerHTML =
    `<div class="grp"><button onclick="showHome()">✦ All Books</button>`+
      `<button onclick="showReview()">Review</button>`+
      `<button onclick="showExam()">Examination</button></div>`+
    `<div class="grp"><button class="active" disabled>The woven threads</button></div>`;
  let h = `<div class="crown">◈ The Loom remembers ◈</div><h1>The Woven Threads</h1>`+
          `<div class="sub">how each book ties back into the ones before — and forward into the ones to come</div>`+
          `<div class="meta">follow a thread to walk the link in either direction</div>`;
  const sources = ORDER.filter(id=>authored(id) && (window.LOOM_DATA[id].threads||[]).length);
  if(!sources.length){
    h += `<div class="empty">No threads woven yet. Author a book with a <i>threads</i> entry and they appear here.</div>`;
  } else {
    sources.forEach(id=>{
      const d = window.LOOM_DATA[id];
      h += `<div class="band"><span>From ${label(id)} — ${d.meta.title}</span><hr></div>`;
      (d.threads||[]).forEach(t=> h += threadCard(t, id));
    });
  }
  h += `<div class="footnav"><button onclick="showHome()">✦ All Books</button></div>`;
  document.getElementById('view').innerHTML = h;
  window.scrollTo({top:0,behavior:'smooth'});
}

/* one thread card; `srcId` is the book it lives on */
function threadCard(t, srcId){
  const dir = t.dir==='back' ? '↩ a thread back' : (t.dir==='ahead' ? 'a thread ahead ↪' : '↔ a thread');
  const toAuthored = authored(t.to);
  const btn = toAuthored
    ? `<button class="lk" onclick="showBook('${t.to}')">Read ${label(t.to)} →</button>`
    : `<button class="lk" disabled>${label(t.to)} — unwritten</button>`;
  return `<div class="thread"><div class="dir">${dir}</div>`+
         `<div class="from">on ${label(srcId)} · links to ${label(t.to)}</div>`+
         `<h3 class="tt">${t.title}</h3><p class="nt">${t.note}</p>${btn}</div>`;
}

/* ---- REVIEW (the missed omens, across every book) ---- */
function showReview(){
  current=null;
  localStorage.removeItem('loom.last');
  document.getElementById('topbar').innerHTML =
    `<div class="grp"><button onclick="showHome()">✦ All Books</button>`+
      `<button onclick="showThreads()">Threads</button>`+
      `<button onclick="showExam()">Examination</button></div>`+
    `<div class="grp"><button class="active" disabled>Re-walking the missed</button></div>`;
  const items = allMisses();
  let h = `<div class="crown">◈ The Loom keeps its frayed strands ◈</div><h1>The Missed Omens</h1>`+
          `<div class="sub">every omen you let slip, gathered from all the books into one re-walking</div>`+
          `<div class="meta">answer true and the strand is mended — it leaves this page</div>`;
  if(!items.length){
    h += `<div class="empty">No omens outstanding. Every strand you missed has been re-walked — the loom is clean.</div>`;
    h += `<div class="footnav"><button onclick="showHome()">✦ All Books</button></div>`;
    document.getElementById('view').innerHTML=h;
    window.scrollTo({top:0,behavior:'smooth'});
    return;
  }
  h += `<div class="tally" id="rtally">${items.length} frayed strand${items.length>1?'s':''} · none yet re-walked</div>`;
  h += `<div id="review"></div>`;
  h += `<div id="reviewdone"><div class="crown" style="color:#eef3e2;">The Strands Re-walked</div><div class="rsum" id="rsum"></div><button onclick="showReview()">Gather what still frays</button></div>`;
  h += `<div class="footnav"><button onclick="showHome()">✦ All Books</button><button onclick="showThreads()">Threads</button></div>`;
  document.getElementById('view').innerHTML=h;
  buildReview(items);
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildReview(items){
  const box=document.getElementById('review');
  const total=items.length; let answered=0, mended=0;
  items.forEach(({id,qi,item})=>{
    const card=document.createElement('div'); card.className='q';
    const ki=KIND[item.kind||'event']||KIND.event;
    card.innerHTML =
      `<div class="reviewfrom">${label(id)} · ${item.n||''}</div>`+
      `<div class="qhead"><span class="qkind ${ki.cls}">${ki.label}</span></div>`+
      `<div class="qt">${item.q}</div>`;
    const truth=document.createElement('div'); truth.className='truth'; truth.innerHTML=item.truth;
    const view=shuffleOpts(item);
    view.opts.forEach((text,oi)=>{
      const b=document.createElement('button'); b.className='opt'; b.textContent=text;
      b.onclick=()=>{
        card.querySelectorAll('.opt').forEach(x=>x.disabled=true);
        const btns=card.querySelectorAll('.opt');
        if(oi===view.correct){
          b.classList.add('correct'); clearMiss(id,qi); mended++;
          card.classList.add('cleared');
        } else {
          b.classList.add('wrong'); btns[view.correct].classList.add('correct');
        }
        truth.classList.add('show'); answered++;
        document.getElementById('rtally').textContent =
          `Re-walked ${answered} of ${total} · ${mended} mended, ${answered-mended} still frayed`;
        if(answered===total) reviewDone(mended,total);
      };
      card.appendChild(b);
    });
    card.appendChild(truth); box.appendChild(card);
  });
}

function reviewDone(mended,total){
  const d=document.getElementById('reviewdone');
  const still=total-mended;
  let line;
  if(still===0) line=`All ${total} strands mended. What you once let slip, you now hold. The loom is clean.`;
  else if(mended===0) line=`None mended this pass — these ${still} run deep. Re-walk their books, then gather them again.`;
  else line=`${mended} mended, ${still} still fray. The mended ones leave this page; come back for the rest.`;
  document.getElementById('rsum').textContent=line;
  d.classList.add('show'); d.scrollIntoView({behavior:'smooth', block:'center'});
}

/* ---- BOOK ---- */
function neighbors(id){
  const a = ORDER.filter(authored);
  const i = a.indexOf(id);
  return { prev: i>0?a[i-1]:null, next: (i>=0&&i<a.length-1)?a[i+1]:null };
}

function topbar(id){
  const p = planOf(id);
  const {prev,next} = neighbors(id);
  const read = isRead(id);
  document.getElementById('topbar').innerHTML =
    `<div class="grp">`+
      `<button onclick="showHome()">✦ All Books</button>`+
      `<button ${prev?`onclick="showBook('${prev}')"`:'disabled'}>← Prev</button>`+
      `<button ${next?`onclick="showBook('${next}')"`:'disabled'}>Next →</button>`+
      `<button onclick="showThreads()">Threads</button>`+
      `<button onclick="showReview()">Review</button>`+
      `<button onclick="showExam()">Examination</button>`+
    `</div>`+
    `<div class="grp"><span class="pos">${p.short} · Book ${p.n}</span>`+
      `<button class="readtoggle${read?' on':''}" onclick="toggleRead('${id}')">${read?'✓ Read':'Mark read'}</button>`+
    `</div>`;
}

function toggleRead(id){ setRead(id, !isRead(id)); topbar(id); }

function showBook(id){
  if(!authored(id)) return;
  current=id; localStorage.setItem('loom.last', id);
  topbar(id);
  renderBody(window.LOOM_DATA[id]);
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderBody(d){
  const m=d.meta; let h='';
  h += `<div class="crown">◈ ${m.song} · ${m.epic} ◈</div><h1>${m.title}</h1>`;
  if(m.subtitle) h += `<div class="sub">${m.subtitle}</div>`;
  if(m.tagline) h += `<div class="meta">${m.tagline}</div>`;
  if(m.epigraph) h += `<div class="invoke">${m.epigraph.text}<span class="src">${m.epigraph.src||''}</span></div>`;
  if(d.recap&&d.recap.length) h += `<div class="recap"><span class="lbl">✦ Previously, on ${m.epic} ✦</span>${d.recap.map(p=>`<p>${p}</p>`).join('')}</div>`;
  if(d.scene&&d.scene.length) h += `<div class="scene"><span class="lbl">✦ The scene is set ✦</span>${d.scene.map(p=>`<p>${p}</p>`).join('')}</div>`;
  if(d.terms&&d.terms.length){
    h += `<div class="band"><span>Words to carry</span><hr></div><div class="terms">`+
      d.terms.map(t=>`<div class="t"><span class="gk">${t.gk}</span> — <span class="df">${t.def}</span></div>`).join('')+`</div>`;
  }
  if(d.movements&&d.movements.length){
    h += `<div class="band"><span>The movements</span><hr></div>`;
    d.movements.forEach(mv=>{ h += `<div class="movement"><div class="mnum">${mv.n||''}</div><h3 class="mtitle">${mv.title}</h3>${mv.what}<div class="why"><b>Why it matters:</b> ${mv.why}</div></div>`; });
  }
  if(d.panels&&d.panels.length){
    d.panels.forEach(p=>{ h += `<div class="simile"><span class="lbl">${p.label}</span>${p.lines.map(l=>`<p>${l}</p>`).join('')}</div>`; });
  }
  if(d.characters){
    Object.keys(d.characters).forEach(group=>{
      h += `<div class="band"><span>${group}</span><hr></div>`;
      d.characters[group].forEach(c=>{
        const godcls=(group.toLowerCase().includes('god')||c.god)?' god':'';
        h += `<div class="c"><h4 class="nm">${c.name}</h4><div class="ep${godcls}">${c.epithet}</div><p class="rl">${c.role}</p>${c.tag?`<span class="tag">${c.tag}</span>`:''}</div>`;
      });
    });
  }
  if(d.threads&&d.threads.length){
    h += `<div class="band"><span>Threads of the Loom</span><hr></div>`;
    d.threads.forEach(t=> h += threadCard(t, current));
  }
  if(d.quiz&&d.quiz.length){
    h += `<div class="divider">❧ · ❧ · ❧</div>`;
    h += `<div class="gate"><div class="crown">◈ The Ninth Hour ◈</div><h2>The Oracle's Examination</h2><div class="sub">${d.quiz.length} omens · the thread holds or the shears draw near</div></div>`;
    const best=bestScore(current);
    h += `<div class="priorscore">${best!=null?`Your best reckoning here: ${best} / ${d.quiz.length}`:'Not yet examined on this book.'}</div>`;
    const pm = priorMiss(current);
    if(pm.length) h += `<div class="missnote">↺ ${pm.length} omen${pm.length>1?'s':''} slipped last time — marked below. Linger there.</div>`;
    h += `<div class="tally" id="tally">${d.quiz.length} omens to read · none yet turned</div><div id="quiz"></div>`;
    h += `<div id="verdict"><div class="crown" style="color:#e8c79a;">The Fates Render Judgment</div><div class="score" id="scoreNum"></div><div class="vline" id="vLine"></div><div class="breakdown" id="breakdown"></div><div class="small">Tap a truth to read it · the thread spins on</div><button onclick="showBook(current)">Sit the omens again</button></div>`;
  }
  const {prev,next}=neighbors(current);
  h += `<div class="footnav"><button ${prev?`onclick="showBook('${prev}')"`:'disabled'}>← Prev</button>`+
       `<button onclick="showHome()">✦ All Books</button>`+
       `<button ${next?`onclick="showBook('${next}')"`:'disabled'}>Next →</button></div>`;

  document.getElementById('view').innerHTML=h;
  if(d.quiz&&d.quiz.length) buildQuiz(d.quiz);
}

/* ---- quiz ---- */
/* The data pins the correct answer to a fixed slot (historically almost always
   index 1 — the second option), so a reader could pass by always tapping the
   second choice. Shuffle each question's options at render time and remap the
   correct index. Safe for persistence: misses/scores are keyed by question index
   (qi), never by option position. */
function shuffleOpts(item){
  const idx=item.opts.map((_,i)=>i);
  for(let i=idx.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]; }
  return { opts: idx.map(i=>item.opts[i]), correct: idx.indexOf(item.correct) };
}
/* A read book with a perfect best score is shown as already-completed: every
   question rendered pre-answered (correct option locked green, truth revealed),
   the golden verdict shown statically, and the "Sit the omens again" button
   repointed to a fresh attempt. No per-answer storage exists to restore, but a
   6/6 seed means every answer was correct, so this reconstruction is faithful.
   forceFresh (from retakeQuiz) skips this and builds a live, blank quiz. */
function buildQuiz(Q, forceFresh){
  const quiz=document.getElementById('quiz');
  if(!forceFresh && isRead(current) && bestScore(current)===Q.length){
    Q.forEach(item=>{
      const card=document.createElement('div'); card.className='q';
      const k=item.kind||'event'; const ki=KIND[k]||KIND.event;
      card.innerHTML=
        `<div class="qhead"><span class="qn">${item.n||''}</span>`+
        `<span class="qkind ${ki.cls}">${ki.label}</span></div>`+
        `<div class="qt">${item.q}</div>`;
      const truth=document.createElement('div'); truth.className='truth show'; truth.innerHTML=item.truth;
      const view=shuffleOpts(item);
      view.opts.forEach((text,oi)=>{
        const b=document.createElement('button'); b.className='opt'; b.textContent=text; b.disabled=true;
        if(oi===view.correct) b.classList.add('correct');
        card.appendChild(b);
      });
      card.appendChild(truth); quiz.appendChild(card);
    });
    document.getElementById('tally').textContent=`All omens already read · ${Q.length} of ${Q.length} · the thread held`;
    const stats={}; Q.forEach(item=>{ const k=item.kind||'event'; (stats[k]=stats[k]||{c:0,t:0}); stats[k].c++; stats[k].t++; });
    const v=document.getElementById('verdict');
    document.getElementById('scoreNum').textContent=`${Q.length} / ${Q.length}`;
    document.getElementById('vLine').textContent="The thread runs golden. You read clearly — the Fates smile on this one.";
    const order=['event','meaning','thread'];
    document.getElementById('breakdown').innerHTML =
      order.filter(k=>stats[k]).map(k=>`<span class="bk">${KIND[k].label} · ${stats[k].c}/${stats[k].t}</span>`).join('');
    v.classList.add('show');
    const again=v.querySelector('button'); if(again) again.onclick=retakeQuiz;
    return;
  }
  const pm = priorMiss(current);
  let answered=0, score=0;
  const missArr=[];
  const stats={};  // kind -> {c,t}
  Q.forEach(item=>{ const k=item.kind||'event'; (stats[k]=stats[k]||{c:0,t:0}).t++; });

  Q.forEach((item,qi)=>{
    const card=document.createElement('div'); card.className='q';
    const k = item.kind||'event';
    const ki = KIND[k]||KIND.event;
    const missedBefore = pm.includes(qi);
    card.innerHTML=
      `<div class="qhead"><span class="qn">${item.n||''}</span>`+
      `<span class="qkind ${ki.cls}">${ki.label}</span>`+
      `${missedBefore?'<span class="missflag">↺ missed last time</span>':''}</div>`+
      `<div class="qt">${item.q}</div>`;
    const truth=document.createElement('div'); truth.className='truth'; truth.innerHTML=item.truth;
    const view=shuffleOpts(item);
    view.opts.forEach((text,oi)=>{
      const b=document.createElement('button'); b.className='opt'; b.textContent=text;
      b.onclick=()=>{
        card.querySelectorAll('.opt').forEach(x=>x.disabled=true);
        const btns=card.querySelectorAll('.opt');
        if(oi===view.correct){ b.classList.add('correct'); score++; stats[k].c++; }
        else{ b.classList.add('wrong'); btns[view.correct].classList.add('correct'); missArr.push(qi); }
        truth.classList.add('show'); answered++;
        document.getElementById('tally').textContent=`Omens read · ${answered} of ${Q.length}`;
        if(answered===Q.length) reveal(score, Q.length, stats, missArr);
      };
      card.appendChild(b);
    });
    card.appendChild(truth); quiz.appendChild(card);
  });
}

/* Leave the completed view and start a fresh, blank attempt without disturbing
   the stored best score (saveScore only ever raises it). */
function retakeQuiz(){
  const d=window.LOOM_DATA[current]; if(!d||!d.quiz) return;
  const v=document.getElementById('verdict');
  if(v){ v.classList.remove('show'); const again=v.querySelector('button'); if(again) again.onclick=()=>showBook(current); }
  document.getElementById('quiz').innerHTML='';
  document.getElementById('tally').textContent=`${d.quiz.length} omens to read · none yet turned`;
  buildQuiz(d.quiz, true);
}

function reveal(score,total,stats,missArr){
  saveScore(current,score);
  saveMiss(current, missArr.slice().sort((a,b)=>a-b));
  const v=document.getElementById('verdict');
  document.getElementById('scoreNum').textContent=`${score} / ${total}`;
  const pct=score/total; let line;
  if(pct===1) line="The thread runs golden. You read clearly — the Fates smile on this one.";
  else if(pct>=0.7) line="The thread holds bright. The book lives in you; a strand or two slipped. Onward.";
  else if(pct>=0.4) line="The thread holds. The spine is yours, the finer turns still forming. Re-walk the movements and go on.";
  else if(pct>0) line="One light in the fog. A single true sight is a beginning; the rest passed too quick. Linger here once more.";
  else line="The thread frays at the meaning, not the count. The pages turned faster than the tale took root. No frown — sit longer.";
  document.getElementById('vLine').textContent=line;
  const order=['event','meaning','thread'];
  const bd = order.filter(k=>stats[k]).map(k=>`<span class="bk">${KIND[k].label} · ${stats[k].c}/${stats[k].t}</span>`).join('');
  document.getElementById('breakdown').innerHTML = bd;
  v.classList.add('show'); v.scrollIntoView({behavior:'smooth', block:'center'});
}

/* ---- THE GRAND EXAMINATION (every authored book, one cumulative sitting) ---- */
/* Pool every quiz omen across all authored books, each tagged with its source book
   so a miss/mend can flow back into the per-book Review loop. */
function examPool(){
  const out=[];
  ORDER.filter(authored).forEach(id=>{
    const d=window.LOOM_DATA[id];
    (d.quiz||[]).forEach((item,qi)=> out.push({srcId:id, qi, item}));
  });
  return out;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

function showExam(){
  current=null;
  localStorage.removeItem('loom.last');
  document.getElementById('topbar').innerHTML =
    `<div class="grp"><button onclick="showHome()">✦ All Books</button>`+
      `<button onclick="showThreads()">Threads</button>`+
      `<button onclick="showReview()">Review</button></div>`+
    `<div class="grp"><button class="active" disabled>The Grand Examination</button></div>`;
  const pool = shuffle(examPool());
  const total = pool.length;
  let h = `<div class="crown">◈ Every thread drawn taut ◈</div><h1>The Grand Examination</h1>`+
          `<div class="sub">all ${total} omens from the books you have walked, gathered into one reckoning</div>`+
          `<div class="meta">the Fates weigh every book at once — no book announced, the thread alone must tell</div>`;
  if(!total){
    h += `<div class="empty">No omens to sit yet. Author a book with a <i>quiz</i> and the examination opens.</div>`+
         `<div class="footnav"><button onclick="showHome()">✦ All Books</button></div>`;
    document.getElementById('view').innerHTML=h; window.scrollTo({top:0,behavior:'smooth'}); return;
  }
  const best=bestScore('exam');
  h += `<div class="priorscore">${best!=null?`Your best reckoning across all books: ${best} / ${total}`:'Not yet sat in full.'}</div>`;
  h += `<div class="divider">❧ · ❧ · ❧</div>`;
  h += `<div class="tally" id="tally">${total} omens to read · none yet turned</div><div id="exam"></div>`;
  h += `<div id="verdict"><div class="crown" style="color:#e8c79a;">The Fates Render Full Judgment</div><div class="score" id="scoreNum"></div><div class="vline" id="vLine"></div><div class="breakdown" id="breakdown"></div><div class="books" id="bookbreak"></div><div class="small">Tap a truth to read it · every book at once</div><button onclick="showExam()">Sit the full reckoning again</button></div>`;
  h += `<div class="footnav"><button onclick="showHome()">✦ All Books</button><button onclick="showThreads()">Threads</button><button onclick="showReview()">Review</button></div>`;
  document.getElementById('view').innerHTML=h;
  buildExam(pool);
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildExam(items){
  const box=document.getElementById('exam');
  const total=items.length; let answered=0, score=0;
  const stats={};   // kind   -> {c,t}
  const byBook={};  // srcId  -> {c,t}
  items.forEach(({srcId,item})=>{ const k=item.kind||'event';
    (stats[k]=stats[k]||{c:0,t:0}).t++; (byBook[srcId]=byBook[srcId]||{c:0,t:0}).t++; });
  items.forEach(({srcId,qi,item},idx)=>{
    const card=document.createElement('div'); card.className='q';
    const k=item.kind||'event'; const ki=KIND[k]||KIND.event;
    card.innerHTML=
      `<div class="qhead"><span class="qn">Omen ${idx+1} of ${total}</span>`+
      `<span class="qkind ${ki.cls}">${ki.label}</span></div>`+
      `<div class="qt">${item.q}</div>`;
    const truth=document.createElement('div'); truth.className='truth';
    const view=shuffleOpts(item);
    view.opts.forEach((text,oi)=>{
      const b=document.createElement('button'); b.className='opt'; b.textContent=text;
      b.onclick=()=>{
        card.querySelectorAll('.opt').forEach(x=>x.disabled=true);
        const btns=card.querySelectorAll('.opt');
        if(oi===view.correct){ b.classList.add('correct'); score++; stats[k].c++; byBook[srcId].c++; clearMiss(srcId,qi); }
        else{ b.classList.add('wrong'); btns[view.correct].classList.add('correct');
              saveMiss(srcId, Array.from(new Set([...priorMiss(srcId), qi])).sort((a,b)=>a-b)); }
        /* source book stays hidden until answered, then revealed with the truth */
        truth.innerHTML = item.truth + `<div class="examsrc">— ${label(srcId)}${item.n?` · ${item.n}`:''}</div>`;
        truth.classList.add('show'); answered++;
        document.getElementById('tally').textContent=`Omens read · ${answered} of ${total}`;
        if(answered===total) examReveal(score,total,stats,byBook);
      };
      card.appendChild(b);
    });
    card.appendChild(truth); box.appendChild(card);
  });
}

function examReveal(score,total,stats,byBook){
  saveScore('exam',score);
  const v=document.getElementById('verdict');
  document.getElementById('scoreNum').textContent=`${score} / ${total}`;
  const pct=score/total; let line;
  if(pct===1) line="Every thread runs golden across all the books. The whole tale lives in you — the Fates fall silent, and that silence is the highest praise.";
  else if(pct>=0.85) line="The weave holds bright end to end. A strand or two slipped, but the epic is yours.";
  else if(pct>=0.7) line="The weave holds. The great shape of the war is in you; the finer turns still settling — gather the frayed omens in the Review.";
  else if(pct>=0.4) line="The spine holds, the detail wavers. You know where the tale is going; sit with the books that slipped and the picture sharpens.";
  else if(pct>0) line="Lights in the fog. Some threads caught, most passed too quick across so many books — gather them in the Review and walk again.";
  else line="The reckoning frays. So many books read fast leave little to hold — no frown; re-walk them one by one, then return to the full sitting.";
  document.getElementById('vLine').textContent=line;
  const order=['event','meaning','thread'];
  const bd=order.filter(k=>stats[k]).map(k=>`<span class="bk">${KIND[k].label} · ${stats[k].c}/${stats[k].t}</span>`).join('');
  document.getElementById('breakdown').innerHTML=bd;
  /* per-book reckoning — canonical reading order; a book under half its omens is flagged to re-walk */
  const rows = ORDER.filter(authored).filter(id=>byBook[id]).map(id=>{
    const {c,t}=byBook[id]; const pct=Math.round((c/t)*100); const weak=c/t<0.5;
    return `<div class="brow${weak?' weak':''}"><span class="bl">${label(id)}</span>`+
           `<span class="bbar"><i style="width:${pct}%"></i></span>`+
           `<span class="bsc">${c}/${t}</span></div>`;
  }).join('');
  document.getElementById('bookbreak').innerHTML = rows
    ? `<h4>By book</h4>${rows}` : '';
  v.classList.add('show'); v.scrollIntoView({behavior:'smooth', block:'center'});
}

/* ---- kickoff: load authored data files, then boot (runs after all decls) ---- */
/* single-file build: all book data is inlined above, so boot directly */
boot();
</script>
